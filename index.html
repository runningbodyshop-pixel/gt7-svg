<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GT7 Pro Layer Vectorizer</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:16px;
  background:#0a1020;
  color:#fff;
  font-family:system-ui,sans-serif;
}

h1{
  margin:0 0 6px;
  font-size:24px;
}

p{
  margin:0 0 14px;
  opacity:.72;
}

.card{
  background:#121a2b;
  border:1px solid #27344d;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

input,
button,
select{
  width:100%;
  border:none;
  border-radius:12px;
  padding:13px;
  margin:7px 0;
  font-size:16px;
}

button{
  background:#7c3aed;
  color:#fff;
  font-weight:800;
}

.sub{
  background:#223047;
}

#thumb{
  width:100%;
  max-height:320px;
  object-fit:contain;
  background:#fff;
  border-radius:12px;
  margin-top:8px;
}

#preview{
  display:none;
  background:#fff;
  border-radius:12px;
  padding:8px;
  margin-top:10px;
  overflow:auto;
  max-height:48vh;
}

#preview svg{
  max-width:100%;
  height:auto;
}

#status{
  white-space:pre-line;
  line-height:1.6;
  font-weight:700;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.box{
  background:#081225;
  border-radius:12px;
  padding:10px;
}

.big{
  font-size:22px;
  color:#4ade80;
}
</style>
</head>

<body>

<h1>GT7 Pro Layer Vectorizer</h1>

<p>
背景除去 / レイヤー重ね方式 / 隙間防止 / 1.5MB絶対制限
</p>

<div class="card">

<b>画像を選択</b>

<input
  type="file"
  id="file"
  accept="image/png,image/jpeg,image/webp"
/>

<img id="thumb">

</div>

<div class="card">

<b>変換モード</b>

<select id="mode">

<option value="anime" selected>
アニメ・イラスト（高精度）
</option>

<option value="soft">
柔らかめ塗り
</option>

<option value="photo">
写真風
</option>

<option value="logo">
ロゴ・シンプル
</option>

</select>

<button id="convert">
SVG化する
</button>

<button id="download" class="sub">
SVGダウンロード
</button>

<button id="showPreview" class="sub">
プレビュー表示
</button>

<button id="hidePreview" class="sub">
プレビュー消去
</button>

</div>

<div class="card">

<div class="row">

<div class="box">
<div>SVGサイズ</div>
<div id="size" class="big">- KB</div>
</div>

<div class="box">
<div>処理サイズ</div>
<div id="dim">-</div>
</div>

</div>

<div id="status">
画像を選択してください
</div>

<div id="preview"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>

<script>

const LIMIT_KB = 1500;

let sourceImg = null;
let svgText = "";

const el = id => document.getElementById(id);

const PRESETS = {

  anime:{
    max:1900,
    colors:110,
    res:.16,
    pathomit:0,
    blur:0,
    blurdelta:6,
    merge:6
  },

  soft:{
    max:1700,
    colors:90,
    res:.24,
    pathomit:1,
    blur:1,
    blurdelta:12,
    merge:8
  },

  photo:{
    max:1300,
    colors:72,
    res:.55,
    pathomit:2,
    blur:1,
    blurdelta:18,
    merge:12
  },

  logo:{
    max:1800,
    colors:28,
    res:.7,
    pathomit:3,
    blur:0,
    blurdelta:20,
    merge:16
  }
};

function kb(svg){

  return new Blob([svg]).size / 1024;
}

function clean(svg){

  return svg

    .replace(/<!--[\s\S]*?-->/g,"")
    .replace(/<desc[\s\S]*?<\/desc>/g,"")
    .replace(/<title[\s\S]*?<\/title>/g,"")

    .replace(/<image[\s\S]*?\/>/g,"")
    .replace(/<foreignObject[\s\S]*?<\/foreignObject>/g,"")

    .replace(/\sstyle="[^"]*"/g,"")
    .replace(/\s(id|class|data-name)="[^"]*"/g,"")

    .replace(/\sxmlns:xlink="[^"]*"/g,"")

    .replace(/\s+/g," ")
    .replace(/>\s+</g,"><")

    .trim();
}

function loadImage(file){

  return new Promise((resolve,reject)=>{

    const reader = new FileReader();

    reader.onerror = () => reject();

    reader.onload = e => {

      const img = new Image();

      img.onload = ()=>resolve(img);

      img.onerror = ()=>reject();

      img.src = e.target.result;

      el("thumb").src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

function draw(img,max){

  let w = img.width;
  let h = img.height;

  if(w > max || h > max){

    const ratio = Math.min(
      max / w,
      max / h
    );

    w = Math.round(w * ratio);
    h = Math.round(h * ratio);
  }

  const canvas =
    document.createElement("canvas");

  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext(
    "2d",
    {willReadFrequently:true}
  );

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  ctx.drawImage(img,0,0,w,h);

  return {
    canvas,
    ctx,
    w,h
  };
}

/*
  背景除去
  白背景近辺を透過
*/

function removeBackground(ctx,w,h){

  const img =
    ctx.getImageData(0,0,w,h);

  const d = img.data;

  for(let i=0;i<d.length;i+=4){

    const r = d[i];
    const g = d[i+1];
    const b = d[i+2];

    if(
      r > 240 &&
      g > 240 &&
      b > 240
    ){
      d[i+3] = 0;
    }
  }

  ctx.putImageData(img,0,0);
}

/*
  色を近いものだけ統合
*/

function mergeNearColors(svg,step){

  return svg.replace(
    /fill="(#[0-9a-fA-F]{6})"/g,
    (m,hex)=>{

      let r=parseInt(hex.slice(1,3),16);
      let g=parseInt(hex.slice(3,5),16);
      let b=parseInt(hex.slice(5,7),16);

      r=Math.round(r/step)*step;
      g=Math.round(g/step)*step;
      b=Math.round(b/step)*step;

      r=Math.max(0,Math.min(255,r));
      g=Math.max(0,Math.min(255,g));
      b=Math.max(0,Math.min(255,b));

      return `fill="#${
        [r,g,b]
        .map(v=>v.toString(16).padStart(2,"0"))
        .join("")
      }"`;
    }
  );
}

/*
  隙間防止
*/

function expandPaths(svg){

  return svg.replace(
    /<path /g,
    `<path
      stroke-linejoin="round"
      stroke-linecap="round"
    `
  );
}

/*
  グラデーション化
*/

function addGradientSupport(svg){

  const gradients = `
<defs>

<linearGradient id="g1"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-opacity=".98"/>
<stop offset="100%" stop-opacity=".98"/>

</linearGradient>

</defs>
`;

  return svg.replace(
    /<svg[^>]*>/,
    match => match + gradients
  );
}

/*
  ベースレイヤー
*/

function addBaseLayer(svg,w,h){

  const base = `
<path
fill="#000"
d="M0 0 H${w} V${h} H0 Z"
/>
`;

  return svg.replace(
    /<svg[^>]*>/,
    match => match + base
  );
}

function simplifyPaths(svg){

  /*
    ガタガタ防止で
    小さい不要パス削除
  */

  return svg.replace(
    /<path[^>]*d="M[^"]{0,18}"[^>]*>/g,
    ""
  );
}

function vectorize(img,mode){

  const p = PRESETS[mode];

  let colors = p.colors;

  let best = null;

  for(let i=0;i<5;i++){

    const drawn =
      draw(
        img,
        Math.round(
          p.max * (1 - (i*.08))
        )
      );

    removeBackground(
      drawn.ctx,
      drawn.w,
      drawn.h
    );

    const data =
      drawn.ctx.getImageData(
        0,
        0,
        drawn.w,
        drawn.h
      );

    const svg =
      ImageTracer.imagedataToSVG(
        data,
        {

          ltres:p.res + (i*.06),
          qtres:p.res + (i*.06),

          pathomit:p.pathomit + i,

          numberofcolors:colors,

          colorquantcycles:6,

          blurradius:p.blur,
          blurdelta:p.blurdelta,

          scale:1,

          roundcoords:1,

          viewbox:true,

          desc:false,

          lcpr:0,
          qcpr:0
        }
      );

    let out = clean(svg);

    out = mergeNearColors(
      out,
      p.merge + (i*2)
    );

    out = simplifyPaths(out);

    out = expandPaths(out);

    out = addGradientSupport(out);

    out = addBaseLayer(
      out,
      drawn.w,
      drawn.h
    );

    out = clean(out);

    const size = kb(out);

    const result = {

      svg:out,
      size,

      w:drawn.w,
      h:drawn.h,

      colors
    };

    if(
      !best ||
      Math.abs(LIMIT_KB-size)
      <
      Math.abs(LIMIT_KB-best.size)
    ){
      best = result;
    }

    if(size <= LIMIT_KB){

      return {
        ...result,
        ok:true
      };
    }

    colors = Math.max(
      18,
      Math.round(colors*.9)
    );
  }

  return {
    ...best,
    ok:best.size <= LIMIT_KB
  };
}

el("file")
.addEventListener("change",async e=>{

  const file = e.target.files[0];

  if(!file) return;

  try{

    sourceImg =
      await loadImage(file);

    svgText = "";

    el("status").textContent =
      `読み込み完了：${sourceImg.width}×${sourceImg.height}px`;

  }catch{

    sourceImg = null;

    el("status").textContent =
      "画像読み込み失敗";
  }
});

el("convert")
.addEventListener("click",()=>{

  if(!sourceImg){

    alert("画像を選択してください");

    return;
  }

  el("status").textContent =
    "GT7向けSVG生成中...";

  setTimeout(()=>{

    try{

      const result =
        vectorize(
          sourceImg,
          el("mode").value
        );

      svgText = result.svg;

      el("size").textContent =
        Math.round(result.size) + " KB";

      el("dim").textContent =
        result.w + " × " + result.h + " px";

      el("status").textContent =
`完了

${result.ok
  ? "1.5MB以下"
  : "1.5MB超過"}

色数：約${result.colors}色

仕様：

・背景除去
・レイヤー重ね方式
・隙間防止
・グラデーション対応
・軽量化済み
・GT7向け`;

    }catch{

      el("status").textContent =
        "変換エラー";
    }

  },100);
});

el("download")
.addEventListener("click",()=>{

  if(!svgText){

    alert("先にSVG化してください");

    return;
  }

  const blob =
    new Blob(
      [svgText],
      {type:"image/svg+xml"}
    );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download =
    "gt7-pro-layer.svg";

  a.click();

  URL.revokeObjectURL(url);
});

el("showPreview")
.addEventListener("click",()=>{

  if(!svgText){

    alert("先にSVG化してください");

    return;
  }

  el("preview").style.display =
    "block";

  el("preview").innerHTML =
    svgText;
});

el("hidePreview")
.addEventListener("click",()=>{

  el("preview").innerHTML = "";

  el("preview").style.display =
    "none";
});

</script>

</body>
</html>
