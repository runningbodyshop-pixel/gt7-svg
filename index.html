<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GT7 Layer Vectorizer 1.5MB</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:16px;background:#0b1020;color:#fff;font-family:system-ui,sans-serif}
h1{font-size:23px;margin:0 0 6px}
p{margin:0 0 14px;opacity:.72}
.card{background:#121a2b;border:1px solid #28344f;border-radius:16px;padding:14px;margin-bottom:12px}
input,select,button{width:100%;padding:13px;margin:7px 0;border:0;border-radius:12px;font-size:16px}
button{background:#7c3aed;color:#fff;font-weight:800}
button.sub{background:#243047}
#thumb{width:100%;max-height:300px;object-fit:contain;background:#fff;border-radius:12px;margin-top:8px}
#status{white-space:pre-line;line-height:1.6;font-weight:700}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.box{background:#081225;border-radius:12px;padding:10px}
.big{font-size:22px;color:#4ade80}
#preview{display:none;background:#fff;border-radius:12px;padding:8px;margin-top:10px;max-height:45vh;overflow:auto}
#preview svg{max-width:100%;height:auto}
</style>
</head>

<body>

<h1>GT7 Layer Vectorizer</h1>
<p>背景除去 / 下地シルエット＋色パーツ重ね / 1.5MB以下 / GT7向け</p>

<div class="card">
  <b>画像</b>
  <input type="file" id="file" accept="image/png,image/jpeg,image/webp">
  <img id="thumb">
</div>

<div class="card">
  <b>モード</b>
  <select id="mode">
    <option value="illust" selected>イラスト：高品質</option>
    <option value="anime">アニメ/線画：輪郭重視</option>
    <option value="logo">ロゴ：軽量</option>
    <option value="photo">写真：ポスター風</option>
  </select>

  <button id="convert">SVG化する</button>
  <button id="download" class="sub">SVGダウンロード</button>
  <button id="showPreview" class="sub">プレビュー表示</button>
  <button id="hidePreview" class="sub">プレビュー消去</button>
</div>

<div class="card">
  <div class="row">
    <div class="box">
      <small>SVGサイズ</small>
      <div id="size" class="big">- KB</div>
    </div>
    <div class="box">
      <small>処理サイズ</small>
      <div id="dim">-</div>
    </div>
  </div>

  <div id="status">画像を選択してください</div>
  <div id="preview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>

<script>
const LIMIT_KB = 1536;

let sourceImg = null;
let svgText = "";

const el = id => document.getElementById(id);

const presets = {
  illust:{
    max:2100,
    colors:132,
    minColors:72,
    res:.18,
    pathomit:0,
    blur:0,
    blurdelta:8,
    bgTolerance:245
  },
  anime:{
    max:2200,
    colors:108,
    minColors:60,
    res:.14,
    pathomit:0,
    blur:0,
    blurdelta:6,
    bgTolerance:245
  },
  logo:{
    max:2000,
    colors:36,
    minColors:18,
    res:.55,
    pathomit:2,
    blur:0,
    blurdelta:18,
    bgTolerance:248
  },
  photo:{
    max:1400,
    colors:84,
    minColors:48,
    res:.8,
    pathomit:4,
    blur:1,
    blurdelta:20,
    bgTolerance:245
  }
};

function kb(svg){
  return new Blob([svg]).size / 1024;
}

function clean(svg){
  return svg
    .replace(/<!--[\s\S]*?-->/g,"")
    .
