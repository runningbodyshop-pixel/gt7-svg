<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GT7 Vectorizer Pro</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:18px;background:#07101f;color:#fff;font-family:system-ui,sans-serif}
h1{margin:0;font-size:26px}
p{opacity:.75;margin:6px 0 18px}
.card{background:#101a2e;border:1px solid #26344f;border-radius:20px;padding:16px;margin-bottom:16px}
input,select,button{width:100%;padding:14px;margin:8px 0;border:0;border-radius:14px;font-size:16px}
button{background:linear-gradient(135deg,#7c3aed,#2563eb);color:white;font-weight:800}
button.secondary{background:#1d2a44}
#thumb{width:100%;max-height:360px;object-fit:contain;background:white;border-radius:14px;margin-top:10px}
#status{white-space:pre-line;line-height:1.6;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#081225;border-radius:14px;padding:12px}
.big{font-size:24px;color:#4ade80}
#svgPreview{display:none;background:white;border-radius:14px;padding:10px;margin-top:12px;max-height:55vh;overflow:auto}
#svgPreview svg{max-width:100%;height:auto}
small{opacity:.7}
</style>
</head>
<body>

<h1>GT7 Vectorizer Pro</h1>
<p>Vectorizer風 / 原型維持優先 / GT7向け / パスベースSVG / 1MB以下絶対</p>

<div class="card">
  <b>1. 画像を選択</b>
  <input type="file" id="file" accept="image/png,image/jpeg,image/webp">
  <img id="thumb">
</div>

<div class="card">
  <b>2. 変換モード</b>
  <select id="mode">
    <option value="illust" selected>イラスト：高品質・1MB以下</option>
    <option value="anime">アニメ/線画：輪郭重視・1MB以下</option>
    <option value="logo">ロゴ：くっきり・1MB以下</option>
    <option value="photo">写真：ポスター風・1MB以下</option>
  </select>
</div>

<div class="card">
  <button id="convert">SVG化する</button>
  <button id="download" class="secondary">SVGをダウンロード</button>
  <button id="previewBtn" class="secondary">SVGプレビュー表示</button>
  <button id="hidePreview" class="secondary">プレビューを消す</button>
</div>

<div class="card">
  <div class="grid">
    <div class="stat"><small>SVGサイズ</small><div id="size" class="big">- KB</div></div>
    <div class="stat"><small>処理サイズ</small><div id="dim">-</div></div>
  </div>
  <div id="status">画像を選択してください</div>
  <div id="svgPreview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>

<script>
const LIMIT_KB = 1024;
let sourceImg = null;
let svgText = "";

const base = {
  illust:{colors:140, blur:0, blurdelta:8, pathomit:0, res:.18, round:2},
  anime:{colors:96,  blur:0, blurdelta:6, pathomit:0, res:.14, round:2},
  logo:{colors:36,   blur:0, blurdelta:20,pathomit:2, res:.7,  round:2},
  photo:{colors:72,  blur:1, blurdelta:20,pathomit:3, res:.8,  round:1}
};

function kb(s){return new Blob([s]).size/1024}

function clean(svg){
  return svg
    .replace(/<!--[\s\S]*?-->/g,"")
    .replace(/<desc[\s\S]*?<\/desc>/g,"")
    .replace(/<title[\s\S]*?<\/title>/g,"")
    .replace(/<image[\s\S]*?\/>/g,"")
    .replace(/<foreignObject[\s\S]*?<\/foreignObject>/g,"")
    .replace(/\sstyle="[^"]*"/g,"")
    .replace(/\s(id|class|data-name)="[^"]*"/g,"")
    .replace(/\sxmlns:xlink="[^"]*"/g,"")
    .replace(/\s+/g," ")
    .replace(/>\s+</g,"><")
    .trim();
}

function quantizeSimilarColors(svg, step){
  return svg.replace(/fill="(#[0-9a-fA-F]{6})"/g,(m,hex)=>{
    let r=parseInt(hex.slice(1,3),16);
    let g=parseInt(hex.slice(3,5),16);
    let b=parseInt(hex.slice(5,7),16);
    r=Math.round(r/step)*step;
    g=Math.round(g/step)*step;
    b=Math.round(b/step)*step;
    r=Math.max(0,Math.min(255,r));
    g=Math.max(0,Math.min(255,g));
    b=Math.max(0,Math.min(255,b));
    return `fill="#${[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("")}"`;
  });
}

function loadImage(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>resolve(img);
      img.src=e.target.result;
      thumb.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function draw(img,max){
  let w=img.width,h=img.height;
  if(w>max||h>max){
    const ratio=Math.min(max/w,max/h);
    w=Math.round(w*ratio);
    h=Math.round(h*ratio);
  }
  const c=document.createElement("canvas");
  c.width=w;c.height=h;
  const ctx=c.getContext("2d",{willReadFrequently:true});
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality="high";
  ctx.drawImage(img,0,0,w,h);
  return {data:ctx.getImageData(0,0,w,h),w,h};
}

function makeSVG(img,mode){
  const b=base[mode];

  const attempts = [
    {max:2300, mul:1.00, color:b.colors, omit:b.pathomit, res:b.res,   q:8},
    {max:2200, mul:0.95, color:b.colors, omit:b.pathomit, res:b.res+.04,q:10},
    {max:2050, mul:0.90, color:Math.round(b.colors*.95), omit:b.pathomit, res:b.res+.08,q:12},
    {max:1900, mul:0.85, color:Math.round(b.colors*.9),  omit:b.pathomit+1, res:b.res+.12,q:14},
    {max:1750, mul:0.80, color:Math.round(b.colors*.85), omit:b.pathomit+1, res:b.res+.18,q:16},
    {max:1600, mul:0.75, color:Math.round(b.colors*.8),  omit:b.pathomit+2, res:b.res+.25,q:18},
    {max:1450, mul:0.70, color:Math.round(b.colors*.72), omit:b.pathomit+2, res:b.res+.35,q:20},
    {max:1300, mul:0.65, color:Math.round(b.colors*.65), omit:b.pathomit+3, res:b.res+.48,q:24},
    {max:1150, mul:0.60, color:Math.round(b.colors*.58), omit:b.pathomit+4, res:b.res+.65,q:28},
    {max:1000, mul:0.55, color:Math.round(b.colors*.5),  omit:b.pathomit+5, res:b.res+.85,q:32},
    {max:850,  mul:0.50, color:Math.round(b.colors*.42), omit:b.pathomit+7, res:b.res+1.1,q:40},
    {max:720,  mul:0.45, color:Math.round(b.colors*.35), omit:b.pathomit+9, res:b.res+1.5,q:48}
  ];

  let best=null;

  for(const a of attempts){
    const d=draw(img,a.max);

    const opt={
      ltres:a.res,
      qtres:a.res,
      pathomit:a.omit,
      numberofcolors:Math.max(12,a.color),
      colorquantcycles:10,
      blurradius:b.blur,
      blurdelta:b.blurdelta,
      scale:1,
      roundcoords:b.round,
      viewbox:true,
      desc:false,
      lcpr:0,
      qcpr:0
    };

    let svg=ImageTracer.imagedataToSVG(d.data,opt);
    svg=clean(svg);
    svg=quantizeSimilarColors(svg,a.q);
    svg=clean(svg);

    let size=kb(svg);

    while(size>LIMIT_KB && opt.numberofcolors>12){
      opt.numberofcolors=Math.max(12,Math.floor(opt.numberofcolors*.85));
      opt.pathomit+=1;
      opt.ltres+=.15;
      opt.qtres+=.15;

      svg=ImageTracer.imagedataToSVG(d.data,opt);
      svg=clean(svg);
      svg=quantizeSimilarColors(svg,a.q+8);
      svg=clean(svg);
      size=kb(svg);
    }

    const result={
      svg,size,w:d.w,h:d.h,
      colors:opt.numberofcolors,
      pathomit:opt.pathomit,
      res:opt.ltres,
      ok:size<=LIMIT_KB
    };

    if(!best || (result.ok && result.size>best.size) || (!best.ok && result.size<best.size)){
      best=result;
    }

    if(result.ok)return result;
  }

  return best;
}

file.addEventListener("change",async e=>{
  const f=e.target.files[0];
  if(!f)return;
  sourceImg=await loadImage(f);
  svgText="";
  status.textContent=`読み込み完了：${sourceImg.width}×${sourceImg.height}px`;
});

convert.addEventListener("click",()=>{
  if(!sourceImg){alert("画像を選択してください");return}

  status.textContent="変換中です。1MB以下になるまで自動最適化します。";
  svgPreview.innerHTML="";
  svgPreview.style.display="none";

  setTimeout(()=>{
    const result=makeSVG(sourceImg,mode.value);
    svgText=result.svg;

    size.textContent=Math.round(result.size)+" KB";
    dim.textContent=result.w+" × "+result.h+" px";

    status.textContent=
`完了
${result.ok ? "1MB以下で出力済み" : "警告：最小設定でも1MB超過"}
色数：約${result.colors}色
pathomit：${result.pathomit}
精度：${result.res.toFixed(2)}
GT7向け：path中心 / imageタグなし / CSSなし`;
  },100);
});

download.addEventListener("click",()=>{
  if(!svgText){alert("先にSVG化してください");return}
  const blob=new Blob([svgText],{type:"image/svg+xml"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="gt7-vectorizer-pro.svg";
  a.click();
  URL.revokeObjectURL(url);
});

previewBtn.addEventListener("click",()=>{
  if(!svgText){alert("先にSVG化してください");return}
  if(kb(svgText)>700 && !confirm("重いSVGです。表示すると落ちる可能性があります。表示しますか？"))return;
  svgPreview.style.display="block";
  svgPreview.innerHTML=svgText;
});

hidePreview.addEventListener("click",()=>{
  svgPreview.innerHTML="";
  svgPreview.style.display="none";
});
</script>

</body>
</html>
