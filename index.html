<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.min.js"></script>

<style>
body{margin:0;background:#111;color:#eee;font-family:system-ui,sans-serif;padding:20px}
.wrap{max-width:880px;margin:auto}
input,button,label,select{display:block;margin:14px 0}
button{padding:12px 18px;font-weight:bold;cursor:pointer}
canvas{max-width:100%;background:#222;margin-top:16px}
a{display:none;color:#7cf;font-size:18px;margin-top:18px}
small{color:#aaa}
</style>

<div class="wrap">
  <h1>GT7用 安定高品質SVG変換</h1>
  <p>スマホで落ちにくい範囲で、顔・髪・傘のディテールを残します。</p>

  <input type="file" id="file" accept="image/png,image/jpeg,image/webp">

  <label>
    最大容量 KB
    <input id="maxKb" type="number" value="1500">
  </label>

  <label>
    変換モード
    <select id="mode">
      <option value="stable" selected>安定高品質</option>
      <option value="safe">軽め</option>
      <option value="fast">高速・落ちにくい</option>
    </select>
  </label>

  <label>
    隙間埋め
    <select id="gap">
      <option value="0.25">弱</option>
      <option value="0.4" selected>標準</option>
      <option value="0.6">強</option>
    </select>
  </label>

  <button id="convert">変換する</button>

  <p id="status">画像を選んでください。</p>
  <canvas id="canvas"></canvas>
  <a id="download" download="gt7-stable-quality.svg">SVGをダウンロード</a>

  <p><small>※落ちる場合は「高速・落ちにくい」を選んでください。</small></p>
</div>

<script>
const fileInput=document.getElementById("file");
const btn=document.getElementById("convert");
const statusEl=document.getElementById("status");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d",{willReadFrequently:true});
const download=document.getElementById("download");

btn.onclick=async()=>{
  try{
    const file=fileInput.files[0];
    if(!file){
      alert("画像を選択してください");
      return;
    }

    btn.disabled=true;
    download.style.display="none";
    statusEl.textContent="読み込み中...";

    const maxBytes=Number(document.getElementById("maxKb").value)*1024;
    const mode=document.getElementById("mode").value;
    const gap=Number(document.getElementById("gap").value);
    const img=await loadImage(file);

    let size =
      mode==="stable" ? 980 :
      mode==="safe" ? 760 :
      560;

    const maxAttempts =
      mode==="stable" ? 5 :
      mode==="safe" ? 4 :
      3;

    let best=null;

    for(let attempt=0;attempt<maxAttempts;attempt++){
      await wait();

      const scale=Math.min(1,size/Math.max(img.width,img.height));
      const w=Math.max(120,Math.round(img.width*scale));
      const h=Math.max(120,Math.round(img.height*scale));

      canvas.width=w;
      canvas.height=h;

      drawBase(img,w,h,mode);

      let imageData=ctx.getImageData(0,0,w,h);
      posterize(imageData,mode,attempt);
      ctx.putImageData(imageData,0,0);

      imageData=ctx.getImageData(0,0,w,h);

      statusEl.textContent=`SVG化中... ${w}×${h}`;
      await wait();

      const options=getOptions(mode,attempt);
      let svg=ImageTracer.imagedataToSVG(imageData,options);

      svg=cleanSvg(svg);
      svg=addGapStroke(svg,gap);

      const bytes=new Blob([svg],{type:"image/svg+xml"}).size;

      if(!best || getScore(bytes,maxBytes,w,h)>getScore(best.bytes,maxBytes,best.w,best.h)){
        best={svg,bytes,w,h};
      }

      statusEl.textContent=`調整中... ${(bytes/1024).toFixed(1)}KB / ${w}×${h}`;

      if(bytes<=maxBytes){
        finish(svg,bytes,w,h,false);
        return;
      }

      size=Math.round(size*0.82);
    }

    finish(best.svg,best.bytes,best.w,best.h,best.bytes>maxBytes);

  }catch(e){
    statusEl.textContent="エラー: "+e.message;
  }finally{
    btn.disabled=false;
  }
};

function wait(){
  return new Promise(resolve=>setTimeout(resolve,80));
}

function getScore(bytes,maxBytes,w,h){
  const over=bytes>maxBytes ? bytes-maxBytes : 0;
  return w*h - over*3000;
}

function loadImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>reject(new Error("画像を読み込めませんでした"));
    img.src=URL.createObjectURL(file);
  });
}

function drawBase(img,w,h,mode){
  ctx.clearRect(0,0,w,h);
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality="high";

  const blur =
    mode==="stable" ? 0.03 :
    mode==="safe" ? 0.12 :
    0.28;

  const contrast =
    mode==="stable" ? 1.015 :
    mode==="safe" ? 1.03 :
    1.05;

  const saturate =
    mode==="stable" ? 1.025 :
    mode==="safe" ? 1.03 :
    1.0;

  ctx.filter=`blur(${blur}px) contrast(${contrast}) saturate(${saturate})`;
  ctx.drawImage(img,0,0,w,h);
  ctx.filter="none";
}

function posterize(imageData,mode,attempt){
  const d=imageData.data;

  const levels =
    mode==="stable" ? Math.max(96,130-attempt*8) :
    mode==="safe" ? Math.max(64,95-attempt*8) :
    Math.max(40,68-attempt*7);

  const step=255/(levels-1);

  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<10){
      d[i+3]=0;
      continue;
    }

    let r=Math.round(d[i]/step)*step;
    let g=Math.round(d[i+1]/step)*step;
    let b=Math.round(d[i+2]/step)*step;

    const max=Math.max(r,g,b);
    const min=Math.min(r,g,b);

    if(max<40 && max-min<5){
      const v=Math.round(((r+g+b)/3)/step)*step;
      r=g=b=v;
    }

    d[i]=r;
    d[i+1]=g;
    d[i+2]=b;
    d[i+3]=255;
  }
}

function getOptions(mode,attempt){
  if(mode==="stable"){
    return {
      ltres:0.38+attempt*0.08,
      qtres:0.38+attempt*0.08,
      pathomit:0.9+attempt*0.25,
      colorsampling:2,
      numberofcolors:Math.max(72,100-attempt*8),
      mincolorratio:0.00012,
      layering:1,
      linefilter:false,
      roundcoords:4,
      scale:1,
      viewbox:true,
      desc:false
    };
  }

  if(mode==="safe"){
    return {
      ltres:0.75+attempt*0.12,
      qtres:0.75+attempt*0.12,
      pathomit:1.8+attempt*0.45,
      colorsampling:2,
      numberofcolors:Math.max(48,72-attempt*7),
      mincolorratio:0.00035,
      layering:1,
      linefilter:false,
      roundcoords:3,
      scale:1,
      viewbox:true,
      desc:false
    };
  }

  return {
    ltres:1.3+attempt*0.18,
    qtres:1.3+attempt*0.18,
    pathomit:3.8+attempt*0.7,
    colorsampling:2,
    numberofcolors:Math.max(28,48-attempt*6),
    mincolorratio:0.0012,
    layering:1,
    linefilter:true,
    roundcoords:2,
    scale:1,
    viewbox:true,
    desc:false
  };
}

function cleanSvg(svg){
  svg=svg.replace(/<desc>[\s\S]*?<\/desc>/g,"");
  svg=svg.replace(/\s+/g," ");
  svg=svg.replace(/>\s+</g,"><");
  svg=svg.trim();

  if(!svg.includes("xmlns=")){
    svg=svg.replace("<svg",'<svg xmlns="http://www.w3.org/2000/svg"');
  }

  svg=svg.replace("<svg",'<svg shape-rendering="geometricPrecision"');
  return svg;
}

function addGapStroke(svg,width){
  return svg.replace(/<path([^>]*?)fill="([^"]+)"([^>]*?)>/g,(m,a,fill,b)=>{
    if(fill==="none" || m.includes("stroke=")){
      return m;
    }

    return `<path${a}fill="${fill}" stroke="${fill}" stroke-width="${width}" stroke-linejoin="round" stroke-linecap="round"${b}>`;
  });
}

function finish(svg,bytes,w,h,over){
  const blob=new Blob([svg],{type:"image/svg+xml"});
  const url=URL.createObjectURL(blob);

  download.href=url;
  download.style.display="inline-block";

  statusEl.textContent=
    (over ? "1500KB超過。最も良い版を出力: " : "完了: ")+
    `${(bytes/1024).toFixed(1)}KB / ${w}×${h}`;
}
</script>
