<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illustration Vectorizer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    h2 {
      font-size: 18px;
      margin: 24px 0 10px;
    }

    .lead {
      margin: 0 0 20px;
      color: #aaa;
    }

    .panel {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 18px;
    }

    .file-label {
      display: inline-block;
      padding: 12px 18px;
      background: #fff;
      color: #111;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .file-label input {
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .controls label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: #ddd;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      background: #3399ff;
      color: white;
    }

    button.secondary {
      background: #444;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      color: #aaa;
      font-size: 14px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 24px;
    }

    canvas,
    .svg-preview {
      width: 100%;
      min-height: 360px;
      background:
        linear-gradient(45deg, #222 25%, transparent 25%),
        linear-gradient(-45deg, #222 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #222 75%),
        linear-gradient(-45deg, transparent 75%, #222 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      border: 1px solid #333;
      border-radius: 16px;
    }

    .svg-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 12px;
    }

    .svg-preview svg {
      max-width: 100%;
      max-height: 520px;
    }

    textarea {
      width: 100%;
      min-height: 280px;
      padding: 14px;
      background: #050505;
      color: #d7ffd7;
      border: 1px solid #333;
      border-radius: 16px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .note {
      color: #aaa;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .controls,
      .preview-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>Illustration Vectorizer</h1>
    <p class="lead">画像を読み込んで、色面ベースのSVGに変換します。</p>

    <section class="panel">
      <label class="file-label">
        画像を選択
        <input id="fileInput" type="file" accept="image/*" />
      </label>

      <div class="controls">
        <label>
          色数
          <input id="colorsInput" type="range" min="4" max="64" value="24" />
          <span><b id="colorsValue">24</b></span>
        </label>

        <label>
          最大サイズ
          <input id="maxSideInput" type="range" min="300" max="1600" step="50" value="800" />
          <span><b id="maxSideValue">800</b>px</span>
        </label>

        <label>
          最小パーツ面積
          <input id="minAreaInput" type="range" min="1" max="400" value="35" />
          <span><b id="minAreaValue">35</b></span>
        </label>

        <label>
          パス簡略化
          <input id="simplifyInput" type="range" min="0" max="8" step="0.25" value="1.5" />
          <span><b id="simplifyValue">1.5</b></span>
        </label>
      </div>

      <div class="buttons">
        <button id="vectorizeBtn" disabled>SVG化する</button>
        <button id="copyBtn" class="secondary" disabled>SVGコードをコピー</button>
        <button id="downloadBtn" class="secondary" disabled>SVGをダウンロード</button>
      </div>

      <div id="status">画像を選択してください。</div>
    </section>

    <div class="preview-grid">
      <section>
        <h2>元画像</h2>
        <canvas id="sourceCanvas"></canvas>
      </section>

      <section>
        <h2>SVGプレビュー</h2>
        <div id="svgPreview" class="svg-preview"></div>
      </section>
    </div>

    <h2>SVGコード</h2>
    <textarea id="svgOutput" spellcheck="false"></textarea>

    <p class="note">
      GT7用に軽くしたい場合は、色数を下げる、最大サイズを下げる、最小パーツ面積を上げる、パス簡略化を上げるとSVGサイズが小さくなります。
    </p>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const sourceCanvas = document.getElementById("sourceCanvas");
    const svgPreview = document.getElementById("svgPreview");
    const svgOutput = document.getElementById("svgOutput");

    const vectorizeBtn = document.getElementById("vectorizeBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");

    const colorsInput = document.getElementById("colorsInput");
    const maxSideInput = document.getElementById("maxSideInput");
    const minAreaInput = document.getElementById("minAreaInput");
    const simplifyInput = document.getElementById("simplifyInput");

    const colorsValue = document.getElementById("colorsValue");
    const maxSideValue = document.getElementById("maxSideValue");
    const minAreaValue = document.getElementById("minAreaValue");
    const simplifyValue = document.getElementById("simplifyValue");

    let loadedImage = null;
    let latestSvg = "";

    bindRange(colorsInput, colorsValue);
    bindRange(maxSideInput, maxSideValue);
    bindRange(minAreaInput, minAreaValue);
    bindRange(simplifyInput, simplifyValue);

    function bindRange(input, output) {
      input.addEventListener("input", () => {
        output.textContent = input.value;
      });
    }

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (!file) return;

      loadedImage = await loadImage(file);
      drawSourceImage();

      vectorizeBtn.disabled = false;
      copyBtn.disabled = true;
      downloadBtn.disabled = true;

      svgOutput.value = "";
      svgPreview.innerHTML = "";
      latestSvg = "";

      statusEl.textContent = "画像を読み込みました。SVG化できます。";
    });

    vectorizeBtn.addEventListener("click", async () => {
      if (!loadedImage) return;

      vectorizeBtn.disabled = true;
      copyBtn.disabled = true;
      downloadBtn.disabled = true;

      statusEl.textContent = "処理中...";

      await waitFrame();

      const options = {
        colors: Number(colorsInput.value),
        maxSide: Number(maxSideInput.value),
        minArea: Number(minAreaInput.value),
        simplify: Number(simplifyInput.value)
      };

      try {
        latestSvg = vectorizeImage(loadedImage, options);

        svgOutput.value = latestSvg;
        svgPreview.innerHTML = latestSvg;

        copyBtn.disabled = false;
        downloadBtn.disabled = false;

        const kb = new Blob([latestSvg], { type: "image/svg+xml" }).size / 1024;
        const pathCount = (latestSvg.match(/<path/g) || []).length;

        statusEl.textContent = `完了しました。パス数: ${pathCount} / SVGサイズ: ${kb.toFixed(1)} KB`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = "エラーが発生しました。最大サイズや色数を下げて試してください。";
      }

      vectorizeBtn.disabled = false;
    });

    copyBtn.addEventListener("click", async () => {
      if (!latestSvg) return;

      await navigator.clipboard.writeText(latestSvg);
      statusEl.textContent = "SVGコードをコピーしました。";
    });

    downloadBtn.addEventListener("click", () => {
      if (!latestSvg) return;

      const blob = new Blob([latestSvg], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "vectorized-illustration.svg";
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    });

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();

        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };

        img.onerror = reject;
        img.src = url;
      });
    }

    function drawSourceImage() {
      const maxSide = Number(maxSideInput.value);

      const size = fitSize(
        loadedImage.naturalWidth,
        loadedImage.naturalHeight,
        maxSide
      );

      sourceCanvas.width = size.width;
      sourceCanvas.height = size.height;

      const ctx = sourceCanvas.getContext("2d", { willReadFrequently: true });
      ctx.clearRect(0, 0, size.width, size.height);
      ctx.drawImage(loadedImage, 0, 0, size.width, size.height);
    }

    function vectorizeImage(img, options) {
      const size = fitSize(
        img.naturalWidth,
        img.naturalHeight,
        options.maxSide
      );

      const width = size.width;
      const height = size.height;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);

      sourceCanvas.width = width;
      sourceCanvas.height = height;
      sourceCanvas.getContext("2d").drawImage(canvas, 0, 0);

      const imageData = ctx.getImageData(0, 0, width, height);
      const pixels = imageData.data;

      const palette = buildPaletteKMeans(pixels, width, height, options.colors);
      const labels = assignLabels(pixels, width, height, palette);

      const paths = buildSvgPathsFromLabels(
        labels,
        width,
        height,
        palette,
        options.minArea,
        options.simplify
      );

      paths.sort((a, b) => b.area - a.area);

      return makeSvg(width, height, paths);
    }

    function fitSize(w, h, maxSide) {
      const scale = Math.min(1, maxSide / Math.max(w, h));

      return {
        width: Math.max(1, Math.round(w * scale)),
        height: Math.max(1, Math.round(h * scale))
      };
    }

    function buildPaletteKMeans(pixels, width, height, k) {
      const samples = [];
      const total = width * height;
      const step = Math.max(1, Math.floor(total / 18000));

      for (let i = 0; i < total; i += step) {
        const p = i * 4;
        const a = pixels[p + 3];

        if (a < 16) continue;

        samples.push([
          pixels[p],
          pixels[p + 1],
          pixels[p + 2]
        ]);
      }

      if (samples.length === 0) {
        return [[0, 0, 0]];
      }

      k = Math.min(k, samples.length);

      const centers = [];

      for (let i = 0; i < k; i++) {
        const index = Math.floor((i / k) * samples.length);
        centers.push([...samples[index]]);
      }

      for (let iter = 0; iter < 10; iter++) {
        const sums = Array.from({ length: k }, () => [0, 0, 0, 0]);

        for (const s of samples) {
          const id = nearestColorIndex(s[0], s[1], s[2], centers);

          sums[id][0] += s[0];
          sums[id][1] += s[1];
          sums[id][2] += s[2];
          sums[id][3]++;
        }

        for (let i = 0; i < k; i++) {
          if (sums[i][3] === 0) continue;

          centers[i][0] = sums[i][0] / sums[i][3];
          centers[i][1] = sums[i][1] / sums[i][3];
          centers[i][2] = sums[i][2] / sums[i][3];
        }
      }

      return centers.map(c => [
        Math.round(c[0]),
        Math.round(c[1]),
        Math.round(c[2])
      ]);
    }

    function assignLabels(pixels, width, height, palette) {
      const total = width * height;
      const labels = new Int16Array(total);

      for (let i = 0; i < total; i++) {
        const p = i * 4;
        const a = pixels[p + 3];

        if (a < 16) {
          labels[i] = -1;
          continue;
        }

        labels[i] = nearestColorIndex(
          pixels[p],
          pixels[p + 1],
          pixels[p + 2],
          palette
        );
      }

      return labels;
    }

    function nearestColorIndex(r, g, b, palette) {
      let best = 0;
      let bestDist = Infinity;

      for (let i = 0; i < palette.length; i++) {
        const c = palette[i];

        const dr = r - c[0];
        const dg = g - c[1];
        const db = b - c[2];

        const dist = dr * dr + dg * dg + db * db;

        if (dist < bestDist) {
          bestDist = dist;
          best = i;
        }
      }

      return best;
    }

    function buildSvgPathsFromLabels(labels, width, height, palette, minArea, simplify) {
      const total = width * height;
      const visited = new Uint8Array(total);
      const inComponent = new Uint8Array(total);
      const paths = [];

      for (let i = 0; i < total; i++) {
        if (visited[i]) continue;

        const label = labels[i];

        if (label < 0) {
          visited[i] = 1;
          continue;
        }

        const component = floodFillComponent(
          labels,
          visited,
          inComponent,
          width,
          height,
          i,
          label
        );

        if (component.length >= minArea) {
          const loops = componentToLoops(
            component,
            inComponent,
            width,
            height,
            simplify
          );

          if (loops.length > 0) {
            const d = loopsToPathD(loops);

            if (d) {
              paths.push({
                d,
                fill: rgbToHex(palette[label]),
                area: component.length
              });
            }
          }
        }

        for (const idx of component) {
          inComponent[idx] = 0;
        }
      }

      return paths;
    }

    function floodFillComponent(labels, visited, inComponent, width, height, start, label) {
      const stack = [start];
      const component = [];

      visited[start] = 1;
      inComponent[start] = 1;

      while (stack.length) {
        const idx = stack.pop();
        component.push(idx);

        const x = idx % width;
        const y = Math.floor(idx / width);

        tryPush(idx - width, y > 0);
        tryPush(idx + width, y < height - 1);
        tryPush(idx - 1, x > 0);
        tryPush(idx + 1, x < width - 1);
      }

      function tryPush(next, ok) {
        if (!ok) return;
        if (visited[next]) return;
        if (labels[next] !== label) return;

        visited[next] = 1;
        inComponent[next] = 1;
        stack.push(next);
      }

      return component;
    }

    function componentToLoops(component, inComponent, width, height, simplify) {
      const edgeMap = new Map();
      let edgeCount = 0;

      function addEdge(x1, y1, x2, y2) {
        const key = `${x1},${y1}`;
        const arr = edgeMap.get(key) || [];

        arr.push([x2, y2]);
        edgeMap.set(key, arr);
        edgeCount++;
      }

      for (const idx of component) {
        const x = idx % width;
        const y = Math.floor(idx / width);

        if (y === 0 || !inComponent[idx - width]) {
          addEdge(x, y, x + 1, y);
        }

        if (x === width - 1 || !inComponent[idx + 1]) {
          addEdge(x + 1, y, x + 1, y + 1);
        }

        if (y === height - 1 || !inComponent[idx + width]) {
          addEdge(x + 1, y + 1, x, y + 1);
        }

        if (x === 0 || !inComponent[idx - 1]) {
          addEdge(x, y + 1, x, y);
        }
      }

      const loops = [];

      while (edgeCount > 0) {
        let startKey = null;

        for (const [key, arr] of edgeMap) {
          if (arr.length) {
            startKey = key;
            break;
          }
        }

        if (!startKey) break;

        const start = startKey.split(",").map(Number);
        const sx = start[0];
        const sy = start[1];

        const loop = [[sx, sy]];

        let cx = sx;
        let cy = sy;
        let safety = 0;

        while (safety++ < 200000) {
          const key = `${cx},${cy}`;
          const arr = edgeMap.get(key);

          if (!arr || arr.length === 0) break;

          const next = arr.pop();
          edgeCount--;

          const nx = next[0];
          const ny = next[1];

          loop.push([nx, ny]);

          cx = nx;
          cy = ny;

          if (cx === sx && cy === sy) break;
        }

        if (loop.length >= 4) {
          const cleaned = removeCollinear(loop);
          const simple = simplify > 0
            ? simplifyClosedPolyline(cleaned, simplify)
            : cleaned;

          if (simple.length >= 4) {
            loops.push(simple);
          }
        }
      }

      return loops;
    }

    function removeCollinear(points) {
      if (points.length <= 4) return points;

      const closed =
        points[0][0] === points[points.length - 1][0] &&
        points[0][1] === points[points.length - 1][1];

      const src = closed ? points.slice(0, -1) : points.slice();
      const out = [];

      for (let i = 0; i < src.length; i++) {
        const prev = src[(i - 1 + src.length) % src.length];
        const curr = src[i];
        const next = src[(i + 1) % src.length];

        const dx1 = curr[0] - prev[0];
        const dy1 = curr[1] - prev[1];
        const dx2 = next[0] - curr[0];
        const dy2 = next[1] - curr[1];

        if (dx1 * dy2 !== dy1 * dx2) {
          out.push(curr);
        }
      }

      if (out.length > 0) {
        out.push(out[0]);
      }

      return out;
    }

    function simplifyClosedPolyline(points, tolerance) {
      if (points.length <= 4) return points;

      const closed =
        points[0][0] === points[points.length - 1][0] &&
        points[0][1] === points[points.length - 1][1];

      const src = closed ? points.slice(0, -1) : points.slice();

      let startIndex = 0;

      for (let i = 1; i < src.length; i++) {
        if (src[i][0] < src[startIndex][0]) {
          startIndex = i;
        }
      }

      const rotated = src.slice(startIndex).concat(src.slice(0, startIndex));
      rotated.push(rotated[0]);

      const simplified = rdp(rotated, tolerance);

      if (
        simplified[0][0] !== simplified[simplified.length - 1][0] ||
        simplified[0][1] !== simplified[simplified.length - 1][1]
      ) {
        simplified.push(simplified[0]);
      }

      return simplified;
    }

    function rdp(points, epsilon) {
      if (points.length < 3) return points;

      let dmax = 0;
      let index = 0;
      const end = points.length - 1;

      for (let i = 1; i < end; i++) {
        const d = perpendicularDistance(points[i], points[0], points[end]);

        if (d > dmax) {
          index = i;
          dmax = d;
        }
      }

      if (dmax > epsilon) {
        const left = rdp(points.slice(0, index + 1), epsilon);
        const right = rdp(points.slice(index), epsilon);

        return left.slice(0, -1).concat(right);
      }

      return [points[0], points[end]];
    }

    function perpendicularDistance(p, a, b) {
      const dx = b[0] - a[0];
      const dy = b[1] - a[1];

      if (dx === 0 && dy === 0) {
        return Math.hypot(p[0] - a[0], p[1] - a[1]);
      }

      return Math.abs(
        dy * p[0] -
        dx * p[1] +
        b[0] * a[1] -
        b[1] * a[0]
      ) / Math.hypot(dx, dy);
    }

    function loopsToPathD(loops) {
      const parts = [];

      for (const loop of loops) {
        if (loop.length < 4) continue;

        const first = loop[0];

        parts.push(`M${num(first[0])} ${num(first[1])}`);

        for (let i = 1; i < loop.length - 1; i++) {
          const p = loop[i];
          parts.push(`L${num(p[0])} ${num(p[1])}`);
        }

        parts.push("Z");
      }

      return parts.join(" ");
    }

    function makeSvg(width, height, paths) {
      const body = paths.map(p => {
        return `  <path d="${p.d}" fill="${p.fill}" fill-rule="evenodd"/>`;
      }).join("\n");

      return `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" shape-rendering="geometricPrecision">
${body}
</svg>`;
    }

    function rgbToHex(rgb) {
      return "#" + rgb.map(v => {
        const s = Math.max(0, Math.min(255, Math.round(v))).toString(16);
        return s.length === 1 ? "0" + s : s;
      }).join("");
    }

    function num(v) {
      return Number.isInteger(v)
        ? String(v)
        : v.toFixed(2).replace(/\.?0+$/, "");
    }

    function waitFrame() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }
  </script>
</body>
</html>
