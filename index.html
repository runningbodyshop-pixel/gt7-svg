<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GT7 Vectorizer Pro</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:18px;background:#07101f;color:#fff;font-family:system-ui,sans-serif}
h1{margin:0;font-size:26px}
p{opacity:.75;margin:6px 0 18px}
.card{background:#101a2e;border:1px solid #26344f;border-radius:20px;padding:16px;margin-bottom:16px}
input,select,button{width:100%;padding:14px;margin:8px 0;border:0;border-radius:14px;font-size:16px}
button{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-weight:800}
button.secondary{background:#1d2a44}
#thumb{width:100%;max-height:360px;object-fit:contain;background:#fff;border-radius:14px;margin-top:10px}
#status{white-space:pre-line;line-height:1.6;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#081225;border-radius:14px;padding:12px}
.big{font-size:24px;color:#4ade80}
#svgPreview{display:none;background:#fff;border-radius:14px;padding:10px;margin-top:12px;max-height:55vh;overflow:auto}
#svgPreview svg{max-width:100%;height:auto}
small{opacity:.7}
</style>
</head>
<body>

<h1>GT7 Vectorizer Pro</h1>
<p>Vectorizer風 / 原型維持優先 / GT7向け / パスベースSVG / 1MB以下絶対</p>

<div class="card">
  <b>1. 画像を選択</b>
  <input type="file" id="file" accept="image/png,image/jpeg,image/webp">
  <img id="thumb">
</div>

<div class="card">
  <b>2. 変換モード</b>
  <select id="mode">
    <option value="illust" selected>イラスト：高品質・1MB以下</option>
    <option value="anime">アニメ/線画：輪郭重視・1MB以下</option>
    <option value="logo">ロゴ：くっきり・1MB以下</option>
    <option value="photo">写真：ポスター風・1MB以下</option>
  </select>
</div>

<div class="card">
  <button id="convert">SVG化する</button>
  <button id="download" class="secondary">SVGをダウンロード</button>
  <button id="previewBtn" class="secondary">SVGプレビュー表示</button>
  <button id="hidePreview" class="secondary">プレビューを消す</button>
</div>

<div class="card">
  <div class="grid">
    <div class="stat"><small>SVGサイズ</small><div id="size" class="big">- KB</div></div>
    <div class="stat"><small>処理サイズ</small><div id="dim">-</div></div>
  </div>
  <div id="status">画像を選択してください</div>
  <div id="svgPreview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>

<script>
const LIMIT_KB = 1024;

let sourceImg = null;
let svgText = "";

const elFile = document.getElementById("file");
const elThumb = document.getElementById("thumb");
const elMode = document.getElementById("mode");
const elConvert = document.getElementById("convert");
const elDownload = document.getElementById("download");
const elPreviewBtn = document.getElementById("previewBtn");
const elHidePreview = document.getElementById("hidePreview");
const elSize = document.getElementById("size");
const elDim = document.getElementById("dim");
const elStatus = document.getElementById("status");
const elSvgPreview = document.getElementById("svgPreview");

const base = {
  illust:{colors:140, blur:0, blurdelta:8, pathomit:0, res:.18, round:2},
  anime:{colors:96,  blur:0, blurdelta:6, pathomit:0, res:.14, round:2},
  logo:{colors:36,   blur:0, blurdelta:20,pathomit:2, res:.7,  round:2},
  photo:{colors:72,  blur:1, blurdelta:20,pathomit:3, res:.8,  round:1}
};

function kb(s){
  return new Blob([s]).size / 1024;
}

function clean(svg){
  return svg
    .replace(/<!--[\s\S]*?-->/g,"")
    .replace(/<desc[\s\S]*?<\/desc>/g,"")
    .replace(/<title[\s\S]*?<\/title>/g,"")
    .replace(/<image[\s\S]*?\/>/g,"")
    .replace(/<foreignObject[\s\S]*?<\/foreignObject>/g,"")
    .replace(/\sstyle="[^"]*"/g,"")
    .replace(/\s(id|class|data-name)="[^"]*"/g,"")
    .replace(/\sxmlns:xlink="[^"]*"/g,"")
    .replace(/\s+/g," ")
    .replace(/>\s+</g,"><")
    .trim();
}

function quantizeSimilarColors(svg, step){
  return svg.replace(/fill="(#[0-9a-fA-F]{6})"/g, function(m, hex){
    let r = parseInt(hex.slice(1,3),16);
    let g = parseInt(hex.slice(3,5),16);
    let b = parseInt(hex.slice(5,7),16);

    r = Math.round(r / step) * step;
    g = Math.round(g / step) * step;
    b = Math.round(b / step) * step;

    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));

    const out = "#" + [r,g,b].map(v => v.toString(16).padStart(2,"0")).join("");
    return `fill="${out}"`;
  });
}

function loadImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onerror = () => reject(new Error("画像の読み込みに失敗しました"));

    reader.onload = e => {
      const img = new Image();

      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("画像を開けませんでした"));

      img.src = e.target.result;
      elThumb.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

function draw(img, max){
  let w = img.width;
  let h = img.height;

  if(w > max || h > max){
    const ratio = Math.min(max / w, max / h);
    w = Math.round(w * ratio);
    h = Math.round(h * ratio);
  }

  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d", { willReadFrequently:true });
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(img, 0, 0, w, h);

  return {
    data: ctx.getImageData(0, 0, w, h),
    w,
    h
  };
}

function traceOnce(img, modeName, attempt){
  const b = base[modeName];
  const d = draw(img, attempt.max);

  const opt = {
    ltres: attempt.res,
    qtres: attempt.res,
    pathomit: attempt.omit,
    numberofcolors: Math.max(8, attempt.color),
    colorquantcycles: 10,
    blurradius: b.blur,
    blurdelta: b.blurdelta,
    scale: 1,
    roundcoords: b.round,
    viewbox: true,
    desc: false,
    lcpr: 0,
    qcpr: 0
  };

  let svg = ImageTracer.imagedataToSVG(d.data, opt);
  svg = clean(svg);
  svg = quantizeSimilarColors(svg, attempt.q);
  svg = clean(svg);

  return {
    svg,
    size: kb(svg),
    w: d.w,
    h: d.h,
    colors: opt.numberofcolors,
    pathomit: opt.pathomit,
    res: opt.ltres,
    ok: kb(svg) <= LIMIT_KB
  };
}

function makeSVG(img, modeName){
  const b = base[modeName];

  const attempts = [
    {max:2300, color:b.colors, omit:b.pathomit,   res:b.res,      q:8},
    {max:2200, color:b.colors, omit:b.pathomit,   res:b.res+.04,  q:10},
    {max:2050, color:Math.round(b.colors*.95), omit:b.pathomit,   res:b.res+.08,  q:12},
    {max:1900, color:Math.round(b.colors*.90), omit:b.pathomit+1, res:b.res+.12,  q:14},
    {max:1750, color:Math.round(b.colors*.85), omit:b.pathomit+1, res:b.res+.18,  q:16},
    {max:1600, color:Math.round(b.colors*.80), omit:b.pathomit+2, res:b.res+.25,  q:18},
    {max:1450, color:Math.round(b.colors*.72), omit:b.pathomit+2, res:b.res+.35,  q:20},
    {max:1300, color:Math.round(b.colors*.65), omit:b.pathomit+3, res:b.res+.48,  q:24},
    {max:1150, color:Math.round(b.colors*.58), omit:b.pathomit+4, res:b.res+.65,  q:28},
    {max:1000, color:Math.round(b.colors*.50), omit:b.pathomit+5, res:b.res+.85,  q:32},
    {max:850,  color:Math.round(b.colors*.42), omit:b.pathomit+7, res:b.res+1.10, q:40},
    {max:720,  color:Math.round(b.colors*.35), omit:b.pathomit+9, res:b.res+1.50, q:48},
    {max:600,  color:Math.round(b.colors*.28), omit:b.pathomit+12,res:b.res+2.00, q:56},
    {max:480,  color:Math.round(b.colors*.22), omit:b.pathomit+16,res:b.res+2.60, q:64}
  ];

  let best = null;

  for(const a of attempts){
    let result = traceOnce(img, modeName, a);

    while(result.size > LIMIT_KB && a.color > 8){
      a.color = Math.max(8, Math.floor(a.color * .82));
      a.omit += 1;
      a.res += .18;
      a.q += 8;
      result = traceOnce(img, modeName, a);
    }

    if(!best){
      best = result;
    }else if(result.ok && !best.ok){
      best = result;
    }else if(result.ok && best.ok && result.size > best.size){
      best = result;
    }else if(!result.ok && !best.ok && result.size < best.size){
      best = result;
    }

    if(result.ok){
      return result;
    }
  }

  if(best && best.size > LIMIT_KB){
    while(best.size > LIMIT_KB){
      const cut = Math.floor(svgText.length * 0.95);
      break;
    }
  }

  return best;
}

elFile.addEventListener("change", async e => {
  const f = e.target.files[0];
  if(!f) return;

  try{
    sourceImg = await loadImage(f);
    svgText = "";

    elSize.textContent = "- KB";
    elDim.textContent = "-";
    elSvgPreview.innerHTML = "";
    elSvgPreview.style.display = "none";

    elStatus.textContent =
      `読み込み完了：${sourceImg.width}×${sourceImg.height}px`;
  }catch(err){
    sourceImg = null;
    elStatus.textContent = err.message;
  }
});

elConvert.addEventListener("click", () => {
  if(!sourceImg){
    alert("画像を選択してください");
    return;
  }

  elStatus.textContent = "変換中です。1MB以下になるまで自動最適化します。";
  elSvgPreview.innerHTML = "";
  elSvgPreview.style.display = "none";

  setTimeout(() => {
    try{
      const result = makeSVG(sourceImg, elMode.value);
      svgText = result.svg;

      elSize.textContent = Math.round(result.size) + " KB";
      elDim.textContent = result.w + " × " + result.h + " px";

      elStatus.textContent =
`完了
${result.ok ? "1MB以下で出力済み" : "警告：最小設定でも1MB超過"}
色数：約${result.colors}色
pathomit：${result.pathomit}
精度：${result.res.toFixed(2)}
GT7向け：path中心 / imageタグなし / CSSなし`;

    }catch(err){
      elStatus.textContent = "変換エラー：" + err.message;
    }
  }, 100);
});

elDownload.addEventListener("click", () => {
  if(!svgText){
    alert("先にSVG化してください");
    return;
  }

  const blob = new Blob([svgText], { type:"image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "gt7-vectorizer-pro.svg";
  a.click();

  URL.revokeObjectURL(url);
});

elPreviewBtn.addEventListener("click", () => {
  if(!svgText){
    alert("先にSVG化してください");
    return;
  }

  if(kb(svgText) > 700){
    const ok = confirm("重いSVGです。表示するとブラウザが落ちる可能性があります。表示しますか？");
    if(!ok) return;
  }

  elSvgPreview.style.display = "block";
  elSvgPreview.innerHTML = svgText;
});

elHidePreview.addEventListener("click", () => {
  elSvgPreview.innerHTML = "";
  elSvgPreview.style.display = "none";
});
</script>

</body>
</html>
