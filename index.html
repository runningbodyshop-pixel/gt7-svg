<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GT7 Auto Fit SVG Vectorizer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #101010;
      color: #eee;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    h2 {
      margin: 24px 0 10px;
      font-size: 18px;
    }

    .lead,
    .note {
      color: #aaa;
      line-height: 1.7;
    }

    .panel {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 18px;
    }

    .file-label {
      display: inline-block;
      padding: 12px 18px;
      background: #fff;
      color: #111;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
    }

    .file-label input {
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(170px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .control {
      background: #151515;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      color: #ddd;
    }

    .control label {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control.row label {
      flex-direction: row;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
    }

    input[type="number"] {
      width: 90px;
      background: #050505;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 7px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      background: #3399ff;
      color: #fff;
    }

    button.secondary {
      background: #444;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      color: #aaa;
      font-size: 14px;
      line-height: 1.7;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      background: #151515;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 14px;
      color: #aaa;
    }

    .stat b {
      display: block;
      color: #fff;
      font-size: 20px;
      margin-top: 4px;
      word-break: break-word;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 24px;
    }

    canvas,
    .svg-preview {
      width: 100%;
      min-height: 380px;
      background:
        linear-gradient(45deg, #222 25%, transparent 25%),
        linear-gradient(-45deg, #222 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #222 75%),
        linear-gradient(-45deg, transparent 75%, #222 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      border: 1px solid #333;
      border-radius: 16px;
    }

    .svg-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 14px;
    }

    .svg-preview svg {
      max-width: 100%;
      max-height: 560px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 14px;
      background: #050505;
      color: #d7ffd7;
      border: 1px solid #333;
      border-radius: 16px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .log {
      min-height: 130px;
      color: #d7eaff;
    }

    @media (max-width: 900px) {
      .controls,
      .stats,
      .preview-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>GT7 Auto Fit SVG Vectorizer</h1>

    <p class="lead">
      イラスト画像をSVG化し、GT7用に指定KB以内へ自動調整します。
      まずは品質を落とさないSVG圧縮から試し、入らない場合だけ段階的に軽量化します。
    </p>

    <section class="panel">
      <label class="file-label">
        画像を選択
        <input id="fileInput" type="file" accept="image/*" />
      </label>

      <div class="controls">
        <div class="control">
          <label>
            目標サイズ KB
            <input id="targetKbInput" type="number" min="4" max="15" step="0.1" value="14.5" />
          </label>
        </div>

        <div class="control">
          <label>
            色数
            <input id="colorsInput" type="range" min="4" max="64" value="24" />
            <span><b id="colorsValue">24</b></span>
          </label>
        </div>

        <div class="control">
          <label>
            最大サイズ
            <input id="maxSideInput" type="range" min="300" max="1800" step="50" value="900" />
            <span><b id="maxSideValue">900</b>px</span>
          </label>
        </div>

        <div class="control">
          <label>
            最小パーツ面積
            <input id="minAreaInput" type="range" min="1" max="400" value="35" />
            <span><b id="minAreaValue">35</b></span>
          </label>
        </div>

        <div class="control">
          <label>
            輪郭簡略化
            <input id="simplifyInput" type="range" min="0" max="8" step="0.25" value="1.5" />
            <span><b id="simplifyValue">1.5</b></span>
          </label>
        </div>

        <div class="control row">
          <label>
            <input id="autoFitInput" type="checkbox" checked />
            目標サイズまで自動調整
          </label>
        </div>

        <div class="control row">
          <label>
            <input id="mergeSameFillInput" type="checkbox" checked />
            同じ色のpathを結合
          </label>
        </div>

        <div class="control row">
          <label>
            <input id="shortColorInput" type="checkbox" checked />
            色コード短縮
          </label>
        </div>
      </div>

      <div class="buttons">
        <button id="vectorizeBtn" disabled>自動でGT7用SVG化</button>
        <button id="copyBtn" class="secondary" disabled>SVGコードをコピー</button>
        <button id="downloadBtn" class="secondary" disabled>SVGをダウンロード</button>
      </div>

      <div id="status">画像を選択してください。</div>

      <div class="stats">
        <div class="stat">
          結果
          <b id="resultStatus">-</b>
        </div>

        <div class="stat">
          SVGサイズ
          <b id="finalSize">-</b>
        </div>

        <div class="stat">
          path数
          <b id="pathCount">-</b>
        </div>

        <div class="stat">
          使用色数
          <b id="usedColors">-</b>
        </div>

        <div class="stat">
          採用設定
          <b id="usedPreset">-</b>
        </div>
      </div>
    </section>

    <div class="preview-grid">
      <section>
        <h2>元画像</h2>
        <canvas id="sourceCanvas"></canvas>
      </section>

      <section>
        <h2>SVGプレビュー</h2>
        <div id="svgPreview" class="svg-preview"></div>
      </section>
    </div>

    <h2>試行ログ</h2>
    <textarea id="logOutput" class="log" spellcheck="false" readonly></textarea>

    <h2>GT7用SVGコード</h2>
    <textarea id="svgOutput" spellcheck="false"></textarea>

    <p class="note">
      15KB以内に入らない場合は、ツールが一番小さくできたSVGを出します。
      その場合は、顔・髪・服・影などで画像を分けて、複数デカールとしてGT7内で重ねるのがおすすめです。
    </p>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const sourceCanvas = document.getElementById("sourceCanvas");
    const svgPreview = document.getElementById("svgPreview");
    const svgOutput = document.getElementById("svgOutput");
    const logOutput = document.getElementById("logOutput");

    const vectorizeBtn = document.getElementById("vectorizeBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");

    const targetKbInput = document.getElementById("targetKbInput");
    const colorsInput = document.getElementById("colorsInput");
    const maxSideInput = document.getElementById("maxSideInput");
    const minAreaInput = document.getElementById("minAreaInput");
    const simplifyInput = document.getElementById("simplifyInput");

    const autoFitInput = document.getElementById("autoFitInput");
    const mergeSameFillInput = document.getElementById("mergeSameFillInput");
    const shortColorInput = document.getElementById("shortColorInput");

    const colorsValue = document.getElementById("colorsValue");
    const maxSideValue = document.getElementById("maxSideValue");
    const minAreaValue = document.getElementById("minAreaValue");
    const simplifyValue = document.getElementById("simplifyValue");

    const resultStatusEl = document.getElementById("resultStatus");
    const finalSizeEl = document.getElementById("finalSize");
    const pathCountEl = document.getElementById("pathCount");
    const usedColorsEl = document.getElementById("usedColors");
    const usedPresetEl = document.getElementById("usedPreset");

    let loadedImage = null;
    let latestSvg = "";

    bindRange(colorsInput, colorsValue);
    bindRange(maxSideInput, maxSideValue);
    bindRange(minAreaInput, minAreaValue);
    bindRange(simplifyInput, simplifyValue);

    function bindRange(input, output) {
      input.addEventListener("input", () => {
        output.textContent = input.value;
      });
    }

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (!file) return;

      loadedImage = await loadImage(file);
      latestSvg = "";

      drawSourceImage();

      vectorizeBtn.disabled = false;
      copyBtn.disabled = true;
      downloadBtn.disabled = true;

      svgOutput.value = "";
      logOutput.value = "";
      svgPreview.innerHTML = "";

      resultStatusEl.textContent = "-";
      finalSizeEl.textContent = "-";
      pathCountEl.textContent = "-";
      usedColorsEl.textContent = "-";
      usedPresetEl.textContent = "-";

      statusEl.textContent = "画像を読み込みました。自動でGT7用SVG化できます。";
    });

    vectorizeBtn.addEventListener("click", async () => {
      if (!loadedImage) return;

      vectorizeBtn.disabled = true;
      copyBtn.disabled = true;
      downloadBtn.disabled = true;

      latestSvg = "";
      svgOutput.value = "";
      svgPreview.innerHTML = "";
      logOutput.value = "";

      const baseOptions = {
        targetBytes: Math.floor(clamp(Number(targetKbInput.value), 4, 15) * 1024),
        colors: clamp(Number(colorsInput.value), 4, 64),
        maxSide: clamp(Number(maxSideInput.value), 300, 1800),
        minArea: clamp(Number(minAreaInput.value), 1, 400),
        simplify: clamp(Number(simplifyInput.value), 0, 8),
        autoFit: autoFitInput.checked,
        mergeSameFill: mergeSameFillInput.checked,
        shortColor: shortColorInput.checked
      };

      try {
        const result = await autoVectorizeForTarget(loadedImage, baseOptions);

        latestSvg = result.svg;
        svgOutput.value = latestSvg;
        svgPreview.innerHTML = latestSvg;

        copyBtn.disabled = false;
        downloadBtn.disabled = false;

        resultStatusEl.textContent = result.passed ? "OK" : "未達";
        finalSizeEl.textContent = formatBytes(result.bytes);
        pathCountEl.textContent = String(result.pathCount);
        usedColorsEl.textContent = String(result.settings.colors);
        usedPresetEl.textContent = result.label;

        if (result.passed) {
          statusEl.textContent = `完了。${formatBytes(result.bytes)} で目標サイズ以内に入りました。`;
        } else {
          statusEl.textContent = `目標サイズには未達ですが、最小候補を出力しました。${formatBytes(result.bytes)} です。`;
        }
      } catch (error) {
        console.error(error);
        statusEl.textContent = "エラーが発生しました。最大サイズ・色数を下げて試してください。";
      }

      vectorizeBtn.disabled = false;
    });

    copyBtn.addEventListener("click", async () => {
      if (!latestSvg) return;

      await navigator.clipboard.writeText(latestSvg);
      statusEl.textContent = "SVGコードをコピーしました。";
    });

    downloadBtn.addEventListener("click", () => {
      if (!latestSvg) return;

      const blob = new Blob([latestSvg], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "gt7-auto-fit.svg";
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    });

    async function autoVectorizeForTarget(img, base) {
      const attempts = base.autoFit ? buildAttempts(base) : [
        {
          label: "手動設定のみ",
          colors: base.colors,
          maxSide: base.maxSide,
          minArea: base.minArea,
          simplify: base.simplify
        }
      ];

      let best = null;

      for (let i = 0; i < attempts.length; i++) {
        const settings = attempts[i];

        statusEl.textContent = `試行 ${i + 1}/${attempts.length}: ${settings.label}`;
        await waitFrame();

        const vector = vectorizeImage(img, {
          colors: settings.colors,
          maxSide: settings.maxSide,
          minArea: settings.minArea,
          simplify: settings.simplify,
          mergeSameFill: base.mergeSameFill,
          shortColor: base.shortColor
        });

        const bytes = byteSize(vector.svg);
        const passed = bytes <= base.targetBytes;

        const row =
          `${passed ? "OK " : "NG "} ` +
          `${settings.label} / ` +
          `${formatBytes(bytes)} / ` +
          `色数:${settings.colors}, ` +
          `最大:${settings.maxSide}, ` +
          `最小面積:${settings.minArea}, ` +
          `簡略:${settings.simplify.toFixed(2)}, ` +
          `path:${vector.pathCount}`;

        appendLog(row);

        const candidate = {
          ...vector,
          bytes,
          passed,
          settings,
          label: settings.label
        };

        if (!best || bytes < best.bytes) {
          best = candidate;
        }

        if (passed) {
          return candidate;
        }
      }

      return best;
    }

    function buildAttempts(base) {
      const c = base.colors;
      const s = base.maxSide;
      const a = base.minArea;
      const q = base.simplify;

      return [
        {
          label: "品質維持 / SVG圧縮のみ",
          colors: c,
          maxSide: s,
          minArea: a,
          simplify: q
        },
        {
          label: "微調整1 / 小パーツ少し整理",
          colors: c,
          maxSide: s,
          minArea: Math.round(a * 1.25),
          simplify: q + 0.25
        },
        {
          label: "微調整2 / 輪郭少し整理",
          colors: c,
          maxSide: s,
          minArea: Math.round(a * 1.5),
          simplify: q + 0.75
        },
        {
          label: "軽量化1 / 小パーツ整理",
          colors: c,
          maxSide: s,
          minArea: Math.round(a * 2),
          simplify: q + 1.25
        },
        {
          label: "軽量化2 / 色数を少し削減",
          colors: Math.max(8, Math.round(c * 0.85)),
          maxSide: s,
          minArea: Math.round(a * 2.25),
          simplify: q + 1.75
        },
        {
          label: "軽量化3 / サイズを少し縮小",
          colors: Math.max(8, Math.round(c * 0.75)),
          maxSide: Math.round(s * 0.9),
          minArea: Math.round(a * 2.75),
          simplify: q + 2.25
        },
        {
          label: "強め1 / GT7優先",
          colors: Math.max(6, Math.round(c * 0.65)),
          maxSide: Math.round(s * 0.8),
          minArea: Math.round(a * 3.5),
          simplify: q + 3
        },
        {
          label: "強め2 / かなり軽量",
          colors: Math.max(5, Math.round(c * 0.5)),
          maxSide: Math.round(s * 0.68),
          minArea: Math.round(a * 5),
          simplify: q + 4
        },
        {
          label: "最終候補 / 超軽量",
          colors: Math.max(4, Math.round(c * 0.38)),
          maxSide: Math.round(s * 0.55),
          minArea: Math.round(a * 8),
          simplify: q + 5.5
        }
      ].map(item => ({
        ...item,
        colors: clamp(item.colors, 4, 64),
        maxSide: clamp(item.maxSide, 250, 1800),
        minArea: clamp(item.minArea, 1, 2000),
        simplify: clamp(item.simplify, 0, 14)
      }));
    }

    function vectorizeImage(img, options) {
      const size = fitSize(img.naturalWidth, img.naturalHeight, options.maxSide);
      const width = size.width;
      const height = size.height;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);

      sourceCanvas.width = width;
      sourceCanvas.height = height;
      sourceCanvas.getContext("2d").drawImage(canvas, 0, 0);

      const imageData = ctx.getImageData(0, 0, width, height);
      const pixels = imageData.data;

      const palette = buildPaletteKMeans(pixels, width, height, options.colors);
      const labels = assignLabels(pixels, width, height, palette);

      const paths = buildSvgPathsFromLabels(
        labels,
        width,
        height,
        palette,
        options.minArea,
        options.simplify,
        options.shortColor
      );

      paths.sort((x, y) => y.area - x.area);

      const finalPaths = options.mergeSameFill ? mergePathsByFill(paths) : paths;
      const svg = makeGt7Svg(width, height, finalPaths);
      const pathCount = (svg.match(/<path/g) || []).length;

      return {
        svg,
        pathCount
      };
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();

        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };

        img.onerror = reject;
        img.src = url;
      });
    }

    function drawSourceImage() {
      const size = fitSize(
        loadedImage.naturalWidth,
        loadedImage.naturalHeight,
        Number(maxSideInput.value)
      );

      sourceCanvas.width = size.width;
      sourceCanvas.height = size.height;

      const ctx = sourceCanvas.getContext("2d", { willReadFrequently: true });
      ctx.clearRect(0, 0, size.width, size.height);
      ctx.drawImage(loadedImage, 0, 0, size.width, size.height);
    }

    function fitSize(w, h, maxSide) {
      const scale = Math.min(1, maxSide / Math.max(w, h));

      return {
        width: Math.max(1, Math.round(w * scale)),
        height: Math.max(1, Math.round(h * scale))
      };
    }

    function buildPaletteKMeans(pixels, width, height, k) {
      const samples = [];
      const total = width * height;
      const step = Math.max(1, Math.floor(total / 20000));

      for (let i = 0; i < total; i += step) {
        const p = i * 4;

        if (pixels[p + 3] < 16) continue;

        samples.push([
          pixels[p],
          pixels[p + 1],
          pixels[p + 2]
        ]);
      }

      if (samples.length === 0) {
        return [[0, 0, 0]];
      }

      k = Math.min(k, samples.length);

      const centers = [];

      for (let i = 0; i < k; i++) {
        const index = Math.floor((i / k) * samples.length);
        centers.push([...samples[index]]);
      }

      for (let iter = 0; iter < 10; iter++) {
        const sums = Array.from({ length: k }, () => [0, 0, 0, 0]);

        for (const s of samples) {
          const id = nearestColorIndex(s[0], s[1], s[2], centers);

          sums[id][0] += s[0];
          sums[id][1] += s[1];
          sums[id][2] += s[2];
          sums[id][3]++;
        }

        for (let i = 0; i < k; i++) {
          if (sums[i][3] === 0) continue;

          centers[i][0] = sums[i][0] / sums[i][3];
          centers[i][1] = sums[i][1] / sums[i][3];
          centers[i][2] = sums[i][2] / sums[i][3];
        }
      }

      return centers.map(c => [
        Math.round(c[0]),
        Math.round(c[1]),
        Math.round(c[2])
      ]);
    }

    function assignLabels(pixels, width, height, palette) {
      const total = width * height;
      const labels = new Int16Array(total);

      for (let i = 0; i < total; i++) {
        const p = i * 4;

        if (pixels[p + 3] < 16) {
          labels[i] = -1;
          continue;
        }

        labels[i] = nearestColorIndex(
          pixels[p],
          pixels[p + 1],
          pixels[p + 2],
          palette
        );
      }

      return labels;
    }

    function nearestColorIndex(r, g, b, palette) {
      let best = 0;
      let bestDist = Infinity;

      for (let i = 0; i < palette.length; i++) {
        const c = palette[i];

        const dr = r - c[0];
        const dg = g - c[1];
        const db = b - c[2];

        const dist = dr * dr + dg * dg + db * db;

        if (dist < bestDist) {
          bestDist = dist;
          best = i;
        }
      }

      return best;
    }

    function buildSvgPathsFromLabels(labels, width, height, palette, minArea, simplify, shortColor) {
      const total = width * height;
      const visited = new Uint8Array(total);
      const inComponent = new Uint8Array(total);
      const paths = [];

      for (let i = 0; i < total; i++) {
        if (visited[i]) continue;

        const label = labels[i];

        if (label < 0) {
          visited[i] = 1;
          continue;
        }

        const component = floodFillComponent(
          labels,
          visited,
          inComponent,
          width,
          height,
          i,
          label
        );

        if (component.length >= minArea) {
          const loops = componentToLoops(
            component,
            inComponent,
            width,
            height,
            simplify
          );

          if (loops.length > 0) {
            const d = loopsToCompactPathD(loops);

            if (d) {
              paths.push({
                d,
                fill: rgbToHex(palette[label], shortColor),
                area: component.length
              });
            }
          }
        }

        for (const idx of component) {
          inComponent[idx] = 0;
        }
      }

      return paths;
    }

    function floodFillComponent(labels, visited, inComponent, width, height, start, label) {
      const stack = [start];
      const component = [];

      visited[start] = 1;
      inComponent[start] = 1;

      while (stack.length) {
        const idx = stack.pop();
        component.push(idx);

        const x = idx % width;
        const y = Math.floor(idx / width);

        tryPush(idx - width, y > 0);
        tryPush(idx + width, y < height - 1);
        tryPush(idx - 1, x > 0);
        tryPush(idx + 1, x < width - 1);
      }

      function tryPush(next, ok) {
        if (!ok) return;
        if (visited[next]) return;
        if (labels[next] !== label) return;

        visited[next] = 1;
        inComponent[next] = 1;
        stack.push(next);
      }

      return component;
    }

    function componentToLoops(component, inComponent, width, height, simplify) {
      const edgeMap = new Map();
      let edgeCount = 0;

      function addEdge(x1, y1, x2, y2) {
        const key = `${x1},${y1}`;
        const arr = edgeMap.get(key) || [];

        arr.push([x2, y2]);
        edgeMap.set(key, arr);
        edgeCount++;
      }

      for (const idx of component) {
        const x = idx % width;
        const y = Math.floor(idx / width);

        if (y === 0 || !inComponent[idx - width]) {
          addEdge(x, y, x + 1, y);
        }

        if (x === width - 1 || !inComponent[idx + 1]) {
          addEdge(x + 1, y, x + 1, y + 1);
        }

        if (y === height - 1 || !inComponent[idx + width]) {
          addEdge(x + 1, y + 1, x, y + 1);
        }

        if (x === 0 || !inComponent[idx - 1]) {
          addEdge(x, y + 1, x, y);
        }
      }

      const loops = [];

      while (edgeCount > 0) {
        let startKey = null;

        for (const [key, arr] of edgeMap) {
          if (arr.length) {
            startKey = key;
            break;
          }
        }

        if (!startKey) break;

        const start = startKey.split(",").map(Number);
        const sx = start[0];
        const sy = start[1];

        const loop = [[sx, sy]];

        let cx = sx;
        let cy = sy;
        let safety = 0;

        while (safety++ < 250000) {
          const key = `${cx},${cy}`;
          const arr = edgeMap.get(key);

          if (!arr || arr.length === 0) break;

          const next = arr.pop();
          edgeCount--;

          const nx = next[0];
          const ny = next[1];

          loop.push([nx, ny]);

          cx = nx;
          cy = ny;

          if (cx === sx && cy === sy) break;
        }

        if (loop.length >= 4) {
          const cleaned = removeCollinear(loop);
          const simple = simplify > 0
            ? simplifyClosedPolyline(cleaned, simplify)
            : cleaned;

          if (simple.length >= 4) {
            loops.push(simple);
          }
        }
      }

      return loops;
    }

    function removeCollinear(points) {
      if (points.length <= 4) return points;

      const closed =
        points[0][0] === points[points.length - 1][0] &&
        points[0][1] === points[points.length - 1][1];

      const src = closed ? points.slice(0, -1) : points.slice();
      const out = [];

      for (let i = 0; i < src.length; i++) {
        const prev = src[(i - 1 + src.length) % src.length];
        const curr = src[i];
        const next = src[(i + 1) % src.length];

        const dx1 = curr[0] - prev[0];
        const dy1 = curr[1] - prev[1];
        const dx2 = next[0] - curr[0];
        const dy2 = next[1] - curr[1];

        if (dx1 * dy2 !== dy1 * dx2) {
          out.push(curr);
        }
      }

      if (out.length > 0) {
        out.push(out[0]);
      }

      return out;
    }

    function simplifyClosedPolyline(points, tolerance) {
      if (points.length <= 4) return points;

      const closed =
        points[0][0] === points[points.length - 1][0] &&
        points[0][1] === points[points.length - 1][1];

      const src = closed ? points.slice(0, -1) : points.slice();

      let startIndex = 0;

      for (let i = 1; i < src.length; i++) {
        if (src[i][0] < src[startIndex][0]) {
          startIndex = i;
        }
      }

      const rotated = src.slice(startIndex).concat(src.slice(0, startIndex));
      rotated.push(rotated[0]);

      const simplified = rdp(rotated, tolerance);

      if (
        simplified[0][0] !== simplified[simplified.length - 1][0] ||
        simplified[0][1] !== simplified[simplified.length - 1][1]
      ) {
        simplified.push(simplified[0]);
      }

      return simplified;
    }

    function rdp(points, epsilon) {
      if (points.length < 3) return points;

      let dmax = 0;
      let index = 0;
      const end = points.length - 1;

      for (let i = 1; i < end; i++) {
        const d = perpendicularDistance(points[i], points[0], points[end]);

        if (d > dmax) {
          index = i;
          dmax = d;
        }
      }

      if (dmax > epsilon) {
        const left = rdp(points.slice(0, index + 1), epsilon);
        const right = rdp(points.slice(index), epsilon);

        return left.slice(0, -1).concat(right);
      }

      return [points[0], points[end]];
    }

    function perpendicularDistance(p, a, b) {
      const dx = b[0] - a[0];
      const dy = b[1] - a[1];

      if (dx === 0 && dy === 0) {
        return Math.hypot(p[0] - a[0], p[1] - a[1]);
      }

      return Math.abs(
        dy * p[0] -
        dx * p[1] +
        b[0] * a[1] -
        b[1] * a[0]
      ) / Math.hypot(dx, dy);
    }

    function loopsToCompactPathD(loops) {
      const parts = [];

      for (const loop of loops) {
        if (loop.length < 4) continue;

        const first = loop[0];

        parts.push(`M${first[0]} ${first[1]}`);

        for (let i = 1; i < loop.length - 1; i++) {
          const p = loop[i];

          // Mの後の座標列はSVG仕様上L扱いになるので、Lを省略して軽量化。
          parts.push(`${p[0]} ${p[1]}`);
        }

        parts.push("Z");
      }

      return parts.join(" ");
    }

    function mergePathsByFill(paths) {
      const map = new Map();

      for (const p of paths) {
        if (!map.has(p.fill)) {
          map.set(p.fill, {
            fill: p.fill,
            d: "",
            area: 0
          });
        }

        const item = map.get(p.fill);
        item.d += item.d ? " " + p.d : p.d;
        item.area += p.area;
      }

      return Array.from(map.values()).sort((a, b) => b.area - a.area);
    }

    function makeGt7Svg(width, height, paths) {
      const body = paths.map(p => {
        return `<path fill="${p.fill}" d="${p.d}"/>`;
      }).join("");

      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}"><g fill-rule="evenodd">${body}</g></svg>`;
    }

    function rgbToHex(rgb, shortColor) {
      const hex = rgb.map(v => {
        const s = Math.max(0, Math.min(255, Math.round(v))).toString(16);
        return s.length === 1 ? "0" + s : s;
      }).join("");

      const h = hex.toLowerCase();

      if (
        shortColor &&
        h[0] === h[1] &&
        h[2] === h[3] &&
        h[4] === h[5]
      ) {
        return `#${h[0]}${h[2]}${h[4]}`;
      }

      return `#${h}`;
    }

    function appendLog(text) {
      logOutput.value += text + "\n";
      logOutput.scrollTop = logOutput.scrollHeight;
    }

    function byteSize(text) {
      return new Blob([text]).size;
    }

    function formatBytes(bytes) {
      if (bytes < 1024) {
        return `${bytes} B`;
      }

      return `${(bytes / 1024).toFixed(1)} KB`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function waitFrame() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }
  </script>
</body>
