<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GT7 Inkscape Style Vectorizer</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:16px;background:#0b1020;color:#fff;font-family:system-ui,sans-serif}
h1{font-size:23px;margin:0 0 6px}
p{opacity:.72;margin:0 0 14px;line-height:1.5}
.card{background:#121a2b;border:1px solid #28344f;border-radius:16px;padding:14px;margin-bottom:12px}
input,select,button{width:100%;padding:13px;margin:7px 0;border:0;border-radius:12px;font-size:16px}
button{background:#7c3aed;color:#fff;font-weight:800}
button.sub{background:#243047}
#thumb{width:100%;max-height:320px;object-fit:contain;background:#fff;border-radius:12px;margin-top:8px}
#status{white-space:pre-line;line-height:1.6;font-weight:700}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.box{background:#081225;border-radius:12px;padding:10px}
.big{font-size:22px;color:#4ade80}
#preview{display:none;background:#fff;border-radius:12px;padding:8px;margin-top:10px;max-height:48vh;overflow:auto}
#preview svg{max-width:100%;height:auto}
small{opacity:.72}
</style>
</head>

<body>

<h1>GT7 Inkscape Style Vectorizer</h1>
<p>背景削除 → ベースシルエット → 色パーツ重ね → 隙間防止。1500KB以下を絶対条件にします。</p>

<div class="card">
  <b>1. 画像を選択</b>
  <input type="file" id="file" accept="image/png,image/jpeg,image/webp">
  <img id="thumb">
</div>

<div class="card">
  <b>2. モード</b>
  <select id="mode">
    <option value="anime" selected>アニメ・イラスト：原型重視</option>
    <option value="soft">柔らかい塗り：色多め</option>
    <option value="logo">ロゴ・単純イラスト</option>
    <option value="photo">写真：ポスター風</option>
  </select>

  <button id="convert">SVG化する</button>
  <button id="download" class="sub">SVGダウンロード</button>
  <button id="showPreview" class="sub">プレビュー表示</button>
  <button id="hidePreview" class="sub">プレビュー消去</button>
</div>

<div class="card">
  <div class="row">
    <div class="box">
      <small>SVGサイズ</small>
      <div id="size" class="big">- KB</div>
    </div>
    <div class="box">
      <small>処理サイズ</small>
      <div id="dim">-</div>
    </div>
  </div>

  <div id="status">画像を選択してください</div>
  <div id="preview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>

<script>
const LIMIT_KB = 1500;

let sourceImg = null;
let svgText = "";

const el = id => document.getElementById(id);

const MODES = {
  anime:{
    max:1900,
    colors:120,
    minColors:64,
    res:.16,
    pathomit:0,
    blur:0,
    blurdelta:6,
    bgThreshold:238,
    mergeStep:6
  },
  soft:{
    max:1750,
    colors:110,
    minColors:60,
    res:.22,
    pathomit:1,
    blur:1,
    blurdelta:12,
    bgThreshold:240,
    mergeStep:8
  },
  logo:{
    max:1850,
    colors:36,
    minColors:16,
    res:.55,
    pathomit:2,
    blur:0,
    blurdelta:20,
    bgThreshold:245,
    mergeStep:14
  },
  photo:{
    max:1300,
    colors:76,
    minColors:40,
    res:.65,
    pathomit:3,
    blur:1,
    blurdelta:18,
    bgThreshold:242,
    mergeStep:12
  }
};

function kb(svg){
  return new Blob([svg]).size / 1024;
}

function clean(svg){
  return svg
    .replace(/<!--[\s\S]*?-->/g,"")
    .replace(/<desc[\s\S]*?<\/desc>/g,"")
    .replace(/<title[\s\S]*?<\/title>/g,"")
    .replace(/<image[\s\S]*?\/>/g,"")
    .replace(/<foreignObject[\s\S]*?<\/foreignObject>/g,"")
    .replace(/\sstyle="[^"]*"/g,"")
    .replace(/\s(id|class|data-name)="[^"]*"/g,"")
    .replace(/\sxmlns:xlink="[^"]*"/g,"")
    .replace(/\sfill-rule="[^"]*"/g,"")
    .replace(/\s+/g," ")
    .replace(/>\s+</g,"><")
    .trim();
}

function loadImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();

    reader.onerror = () => reject(new Error("画像読み込みに失敗しました"));

    reader.onload = e => {
      const img = new Image();

      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("画像を開けませんでした"));

      img.src = e.target.result;
      el("thumb").src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

function draw(img,max){
  let w = img.width;
  let h = img.height;

  if(w > max || h > max){
    const r = Math.min(max / w, max / h);
    w = Math.round(w * r);
    h = Math.round(h * r);
  }

  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d",{willReadFrequently:true});
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(img,0,0,w,h);

  return {canvas,ctx,w,h};
}

/*
  背景削除：
  端の色＋白系を背景として透明化。
*/
function removeBackground(ctx,w,h,threshold){
  const img = ctx.getImageData(0,0,w,h);
  const d = img.data;

  const samples = [
    [0,0],
    [w-1,0],
    [0,h-1],
    [w-1,h-1],
    [Math.floor(w/2),0],
    [Math.floor(w/2),h-1],
    [0,Math.floor(h/2)],
    [w-1,Math.floor(h/2)]
  ];

  let sr=0, sg=0, sb=0;

  samples.forEach(([x,y])=>{
    const i = (y*w+x)*4;
    sr += d[i];
    sg += d[i+1];
    sb += d[i+2];
  });

  sr = sr / samples.length;
  sg = sg / samples.length;
  sb = sb / samples.length;

  for(let i=0;i<d.length;i+=4){
    const r = d[i];
    const g = d[i+1];
    const b = d[i+2];

    const nearEdgeBg =
      Math.abs(r-sr) < 28 &&
      Math.abs(g-sg) < 28 &&
      Math.abs(b-sb) < 28;

    const whiteBg =
      r > threshold &&
      g > threshold &&
      b > threshold;

    if(nearEdgeBg || whiteBg){
      d[i+3] = 0;
    }
  }

  ctx.putImageData(img,0,0);
  return img;
}

/*
  透明でない部分だけの簡易シルエットを作る。
  Inkscapeで下地を先に置くような役割。
*/
function createBaseSilhouette(imageData,w,h){
  const d = imageData.data;
  const points = [];

  const step = Math.max(4, Math.round(Math.max(w,h) / 260));

  for(let y=0;y<h;y+=step){
    for(let x=0;x<w;x+=step){
      const i = (y*w+x)*4;
      if(d[i+3] > 20){
        points.push([x,y]);
      }
    }
  }

  if(points.length < 3){
    return "";
  }

  points.sort((a,b)=>a[0]-b[0] || a[1]-b[1]);

  function cross(o,a,b){
    return (a[0]-o[0])*(b[1]-o[1]) - (a[1]-o[1])*(b[0]-o[0]);
  }

  const lower = [];
  for(const p of points){
    while(lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0){
      lower.pop();
    }
    lower.push(p);
  }

  const upper = [];
  for(let i=points.length-1;i>=0;i--){
    const p = points[i];
    while(upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0){
      upper.pop();
    }
    upper.push(p);
  }

  const hull = lower.slice(0,-1).concat(upper.slice(0,-1));

  if(hull.length < 3){
    return "";
  }

  let dPath = "M" + hull.map(p=>p[0]+" "+p[1]).join(" L") + " Z";

  return `<path fill="#111111" d="${dPath}"/>`;
}

/*
  近い色だけまとめる。
*/
function mergeNearColors(svg,step){
  return svg.replace(/fill="(#[0-9a-fA-F]{6})"/g,(m,hex)=>{
    let r=parseInt(hex.slice(1,3),16);
    let g=parseInt(hex.slice(3,5),16);
    let b=parseInt(hex.slice(5,7),16);

    r=Math.round(r/step)*step;
    g=Math.round(g/step)*step;
    b=Math.round(b/step)*step;

    r=Math.max(0,Math.min(255,r));
    g=Math.max(0,Math.min(255,g));
    b=Math.max(0,Math.min(255,b));

    return `fill="#${[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("")}"`;
  });
}

/*
  隙間防止：
  fillと同じ色の細いstrokeを追加する。
  GT7で不要なら後からInkscapeでstroke削除可能。
*/
function addAntiGapStroke(svg,strokeWidth){
  return svg.replace(/<path([^>]*?)fill="(#[0-9a-fA-F]{6})"([^>]*?)>/g,
    `<path$1fill="$2" stroke="$2" stroke-width="${strokeWidth}" stroke-linejoin="round" stroke-linecap="round"$3>`);
}

/*
  小さすぎるパスを削除。
  ガタガタ線・ゴミ削減。
*/
function removeTinyPaths(svg,minLen){
  return svg.replace(/<path[^>]*d="([^"]*)"[^>]*>/g,(m,d)=>{
    return d.length < minLen ? "" : m;
  });
}

/*
  SVG本体にベースシルエットを先頭追加。
*/
function injectBase(svg,basePath){
  if(!basePath) return svg;
  return svg.replace(/<svg[^>]*>/,match=>match + basePath);
}

function traceInkscapeStyle(img,modeName){
  const m = MODES[modeName];

  const attempts = [
    {scale:1.00, colors:m.colors, res:m.res,      omit:m.pathomit,   merge:m.mergeStep,   minPath:12, stroke:.45},
    {scale:.94, colors:Math.round(m.colors*.96), res:m.res+.04,  omit:m.pathomit,   merge:m.mergeStep+1, minPath:16, stroke:.45},
    {scale:.88, colors:Math.round(m.colors*.92), res:m.res+.08,  omit:m.pathomit+1, merge:m.mergeStep+2, minPath:20, stroke:.5},
    {scale:.82, colors:Math.round(m.colors*.88), res:m.res+.13,  omit:m.pathomit+1, merge:m.mergeStep+3, minPath:24, stroke:.55},
    {scale:.75, colors:Math.round(m.colors*.82), res:m.res+.2,   omit:m.pathomit+2, merge:m.mergeStep+4, minPath:30, stroke:.6},
    {scale:.68, colors:Math.max(m.minColors,Math.round(m.colors*.75)), res:m.res+.32, omit:m.pathomit+3, merge:m.mergeStep+6, minPath:38, stroke:.65}
  ];

  let best = null;

  for(const a of attempts){
    const drawn = draw(img,Math.round(m.max*a.scale));
    const transparentData = removeBackground(drawn.ctx,drawn.w,drawn.h,m.bgThreshold);
    const basePath = createBaseSilhouette(transparentData,drawn.w,drawn.h);

    const opt = {
      ltres:a.res,
      qtres:a.res,
      pathomit:a.omit,
      numberofcolors:Math.max(m.minColors,a.colors),
      colorquantcycles:7,
      blurradius:m.blur,
      blurdelta:m.blurdelta,
      scale:1,
      roundcoords:1,
      viewbox:true,
      desc:false,
      lcpr:0,
      qcpr:0
    };

    let svg = ImageTracer.imagedataToSVG(transparentData,opt);

    svg = clean(svg);
    svg = mergeNearColors(svg,a.merge);
    svg = removeTinyPaths(svg,a.minPath);
    svg = addAntiGapStroke(svg,a.stroke);
    svg = injectBase(svg,basePath);
    svg = clean(svg);

    const size = kb(svg);

    const result = {
      svg,
      size,
      w:drawn.w,
      h:drawn.h,
      colors:opt.numberofcolors,
      res:a.res,
      omit:a.omit,
      ok:size <= LIMIT_KB
    };

    if(!best){
      best = result;
    }else if(result.ok && !best.ok){
      best = result;
    }else if(result.ok && best.ok && result.size > best.size){
      best = result;
    }else if(!result.ok && !best.ok && result.size < best.size){
      best = result;
    }

    if(result.ok){
      return result;
    }
  }

  return best;
}

el("file").addEventListener("change",async e=>{
  const file = e.target.files[0];
  if(!file) return;

  try{
    sourceImg = await loadImage(file);
    svgText = "";
    el("size").textContent = "- KB";
    el("dim").textContent = "-";
    el("preview").innerHTML = "";
    el("preview").style.display = "none";

    el("status").textContent =
      `読み込み完了：${sourceImg.width}×${sourceImg.height}px`;
  }catch(err){
    sourceImg = null;
    el("status").textContent = err.message;
  }
});

el("convert").addEventListener("click",()=>{
  if(!sourceImg){
    alert("画像を選択してください");
    return;
  }

  el("status").textContent =
    "Inkscape風にトレース中...\n背景削除 → 下地作成 → 色パーツ重ね → 1500KB以下に調整";

  el("preview").innerHTML = "";
  el("preview").style.display = "none";

  setTimeout(()=>{
    try{
      const result = traceInkscapeStyle(sourceImg,el("mode").value);
      svgText = result.svg;

      el("size").textContent = Math.round(result.size) + " KB";
      el("dim").textContent = result.w + " × " + result.h + " px";

      el("status").textContent =
`完了
${result.ok ? "1500KB以下で出力済み" : "警告：最小設定でも1500KB超過"}
色数：約${result.colors}色
精度：${result.res.toFixed(2)}
pathomit：${result.omit}

方式：
・背景削除
・ベースシルエットを先に配置
・上に色パーツを重ねる
・fillと同色strokeで隙間防止
・小さいゴミパス削除
・GT7向け imageタグなし / CSSなし`;

    }catch(err){
      el("status").textContent = "変換エラー：" + err.message;
    }
  },100);
});

el("download").addEventListener("click",()=>{
  if(!svgText){
    alert("先にSVG化してください");
    return;
  }

  const blob = new Blob([svgText],{type:"image/svg+xml"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "gt7-inkscape-style.svg";
  a.click();

  URL.revokeObjectURL(url);
});

el("showPreview").addEventListener("click",()=>{
  if(!svgText){
    alert("先にSVG化してください");
    return;
  }

  if(kb(svgText) > 900){
    if(!confirm("重いSVGです。表示すると落ちる可能性があります。表示しますか？")){
      return;
    }
  }

  el("preview").style.display = "block";
  el("preview").innerHTML = svgText;
});

el("hidePreview").addEventListener("click",()=>{
  el("preview").innerHTML = "";
  el("preview").style.display = "none";
});
</script>

</body>
</html>
