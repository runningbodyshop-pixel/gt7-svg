<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GT7 Fast Vectorizer</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:16px;background:#0b1020;color:#fff;font-family:system-ui,sans-serif}
h1{font-size:24px;margin:0 0 6px}
p{opacity:.7;margin:0 0 14px}
.card{background:#121a2b;border:1px solid #28344f;border-radius:16px;padding:14px;margin-bottom:12px}
input,select,button{width:100%;padding:13px;margin:7px 0;border:0;border-radius:12px;font-size:16px}
button{background:#7c3aed;color:white;font-weight:800}
button.sub{background:#243047}
#thumb{width:100%;max-height:300px;object-fit:contain;background:white;border-radius:12px;margin-top:8px}
#status{white-space:pre-line;line-height:1.6;font-weight:700}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.box{background:#081225;border-radius:12px;padding:10px}
.big{font-size:22px;color:#4ade80}
#preview{display:none;background:white;border-radius:12px;padding:8px;margin-top:10px;max-height:45vh;overflow:auto}
#preview svg{max-width:100%;height:auto}
</style>
</head>
<body>

<h1>GT7 Fast Vectorizer</h1>
<p>高速 / 原型維持 / 色をなるべく残す / 1000KB以下</p>

<div class="card">
  <b>画像</b>
  <input type="file" id="file" accept="image/png,image/jpeg,image/webp">
  <img id="thumb">
</div>

<div class="card">
  <b>モード</b>
  <select id="mode">
    <option value="illust" selected>イラスト：高精度・高速</option>
    <option value="anime">アニメ/線画：輪郭重視</option>
    <option value="logo">ロゴ：軽量</option>
    <option value="photo">写真：ポスター風</option>
  </select>

  <button id="convert">SVG化する</button>
  <button id="download" class="sub">SVGをダウンロード</button>
  <button id="showPreview" class="sub">プレビュー表示</button>
  <button id="hidePreview" class="sub">プレビュー消去</button>
</div>

<div class="card">
  <div class="row">
    <div class="box">
      <small>SVGサイズ</small>
      <div id="size" class="big">- KB</div>
    </div>
    <div class="box">
      <small>処理サイズ</small>
      <div id="dim">-</div>
    </div>
  </div>

  <div id="status">画像を選択してください</div>
  <div id="preview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>

<script>
const LIMIT_KB = 1000;

let sourceImg = null;
let svgText = "";

const el = id => document.getElementById(id);

const config = {
  illust: {
    max: 1850,
    colors: 128,
    res: 0.24,
    pathomit: 0,
    blur: 0,
    blurdelta: 8,
    round: 2,
    minColors: 96
  },
  anime: {
    max: 1900,
    colors: 112,
    res: 0.18,
    pathomit: 0,
    blur: 0,
    blurdelta: 6,
    round: 2,
    minColors: 80
  },
  logo: {
    max: 1800,
    colors: 40,
    res: 0.65,
    pathomit: 2,
    blur: 0,
    blurdelta: 20,
    round: 2,
    minColors: 24
  },
  photo: {
    max: 1200,
    colors: 80,
    res: 0.75,
    pathomit: 3,
    blur: 1,
    blurdelta: 18,
    round: 1,
    minColors: 56
  }
};

function kb(svg){
  return new Blob([svg]).size / 1024;
}

function clean(svg){
  return svg
    .replace(/<!--[\s\S]*?-->/g,"")
    .replace(/<desc[\s\S]*?<\/desc>/g,"")
    .replace(/<title[\s\S]*?<\/title>/g,"")
    .replace(/<image[\s\S]*?\/>/g,"")
    .replace(/<foreignObject[\s\S]*?<\/foreignObject>/g,"")
    .replace(/\sstyle="[^"]*"/g,"")
    .replace(/\s(id|class|data-name)="[^"]*"/g,"")
    .replace(/\sxmlns:xlink="[^"]*"/g,"")
    .replace(/\s+/g," ")
    .replace(/>\s+</g,"><")
    .trim();
}

function softColorMerge(svg, step){
  return svg.replace(/fill="(#[0-9a-fA-F]{6})"/g, (m, hex) => {
    let r = parseInt(hex.slice(1,3),16);
    let g = parseInt(hex.slice(3,5),16);
    let b = parseInt(hex.slice(5,7),16);

    r = Math.round(r / step) * step;
    g = Math.round(g / step) * step;
    b = Math.round(b / step) * step;

    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));

    return `fill="#${[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("")}"`;
  });
}

function loadImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();

    reader.onerror = () => reject(new Error("画像読み込み失敗"));

    reader.onload = e => {
      const img = new Image();

      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("画像を開けません"));

      img.src = e.target.result;
      el("thumb").src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

function drawImage(img, max){
  let w = img.width;
  let h = img.height;

  if(w > max || h > max){
    const ratio = Math.min(max / w, max / h);
    w = Math.round(w * ratio);
    h = Math.round(h * ratio);
  }

  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d", { willReadFrequently:true });
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(img,0,0,w,h);

  return {
    data: ctx.getImageData(0,0,w,h),
    w,
    h
  };
}

function traceOnce(img, c){
  const drawn = drawImage(img, c.max);

  const opt = {
    ltres: c.res,
    qtres: c.res,
    pathomit: c.pathomit,
    numberofcolors: c.colors,
    colorquantcycles: 8,
    blurradius: c.blur,
    blurdelta: c.blurdelta,
    scale: 1,
    roundcoords: c.round,
    viewbox: true,
    desc: false,
    lcpr: 0,
    qcpr: 0
  };

  let svg = ImageTracer.imagedataToSVG(drawn.data, opt);
  svg = clean(svg);

  if(c.mergeStep){
    svg = softColorMerge(svg, c.mergeStep);
    svg = clean(svg);
  }

  return {
    svg,
    size: kb(svg),
    w: drawn.w,
    h: drawn.h,
    colors: c.colors,
    res: c.res,
    pathomit: c.pathomit
  };
}

function fastVectorize(img, mode){
  const base = {...config[mode]};

  /*
    高速化のため最大4回だけ試す。
    色数はなるべく維持。
    先に軽い色統合と座標丸めで調整。
  */
  const attempts = [
    {...base, mergeStep: 6},
    {
      ...base,
      max: Math.round(base.max * 0.9),
      res: base.res + 0.08,
      pathomit: base.pathomit + 1,
      mergeStep: 8
    },
    {
      ...base,
      max: Math.round(base.max * 0.8),
      colors: Math.max(base.minColors, Math.round(base.colors * 0.9)),
      res: base.res + 0.18,
      pathomit: base.pathomit + 2,
      mergeStep: 10
    },
    {
      ...base,
      max: Math.round(base.max * 0.7),
      colors: Math.max(base.minColors, Math.round(base.colors * 0.82)),
      res: base.res + 0.32,
      pathomit: base.pathomit + 3,
      mergeStep: 12
    }
  ];

  let best = null;

  for(const a of attempts){
    const r = traceOnce(img, a);

    if(!best || Math.abs(LIMIT_KB - r.size) < Math.abs(LIMIT_KB - best.size)){
      best = r;
    }

    if(r.size <= LIMIT_KB){
      return {...r, ok:true};
    }
  }

  // 最終1回だけ、確実に1000KB以下に寄せる
  const final = {
    ...base,
    max: Math.round(base.max * 0.62),
    colors: base.minColors,
    res: base.res + 0.5,
    pathomit: base.pathomit + 5,
    mergeStep: 16
  };

  const r = traceOnce(img, final);

  if(r.size <= LIMIT_KB){
    return {...r, ok:true};
  }

  return {...r, ok:false};
}

el("file").addEventListener("change", async e => {
  const file = e.target.files[0];
  if(!file) return;

  try{
    sourceImg = await loadImage(file);
    svgText = "";

    el("size").textContent = "- KB";
    el("dim").textContent = "-";
    el("preview").innerHTML = "";
    el("preview").style.display = "none";

    el("status").textContent =
      `読み込み完了：${sourceImg.width}×${sourceImg.height}px`;
  }catch(err){
    sourceImg = null;
    el("status").textContent = err.message;
  }
});

el("convert").addEventListener("click", () => {
  if(!sourceImg){
    alert("画像を選択してください");
    return;
  }

  const mode = el("mode").value;

  el("status").textContent =
    "変換中です。高速モードで30秒〜1分を目標に処理します。";

  el("preview").innerHTML = "";
  el("preview").style.display = "none";

  setTimeout(() => {
    try{
      const result = fastVectorize(sourceImg, mode);
      svgText = result.svg;

      el("size").textContent = Math.round(result.size) + " KB";
      el("dim").textContent = result.w + " × " + result.h + " px";

      el("status").textContent =
`完了
${result.ok ? "1000KB以下で出力済み" : "警告：1000KBを超過しました"}
色数：約${result.colors}色
精度：${result.res.toFixed(2)}
pathomit：${result.pathomit}
プレビューは必要な時だけ表示してください。`;

    }catch(err){
      el("status").textContent = "変換エラー：" + err.message;
    }
  },100);
});

el("download").addEventListener("click", () => {
  if(!svgText){
    alert("先にSVG化してください");
    return;
  }

  const blob = new Blob([svgText], {type:"image/svg+xml"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "gt7-fast-vectorized.svg";
  a.click();

  URL.revokeObjectURL(url);
});

el("showPreview").addEventListener("click", () => {
  if(!svgText){
    alert("先にSVG化してください");
    return;
  }

  if(kb(svgText) > 700){
    if(!confirm("重いSVGです。表示すると落ちる可能性があります。表示しますか？")){
      return;
    }
  }

  el("preview").style.display = "block";
  el("preview").innerHTML = svgText;
});

el("hidePreview").addEventListener("click", () => {
  el("preview").innerHTML = "";
  el("preview").style.display = "none";
});
</script>

</body>
</html>
