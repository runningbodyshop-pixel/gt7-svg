<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GT7 Ultra Quality SVG Converter</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;background:#0b1020;color:#fff;padding:18px}
h1{font-size:24px;margin:0 0 4px}
p{opacity:.75;margin:0 0 18px}
.card{background:#121a2b;border:1px solid #263149;border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 12px 30px #0005}
label{font-weight:700;display:block;margin-bottom:8px}
input,select,button{width:100%;padding:14px;border:0;border-radius:14px;font-size:16px;margin:8px 0}
button{font-weight:800;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
button.secondary{background:#202a3c}
#thumb{width:100%;max-height:420px;object-fit:contain;background:#fff;border-radius:14px;margin-top:10px}
#status{white-space:pre-line;line-height:1.6;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#0d1424;border-radius:14px;padding:12px}
.big{font-size:26px;color:#4ade80}
small{opacity:.7}
</style>
</head>

<body>

<h1>GT7 Ultra Quality SVG Converter</h1>
<p>イラストの原型維持優先 / パスベースSVG / 900KB以下を狙う軽量版</p>

<div class="card">
  <label>1. 画像を選択</label>
  <input type="file" id="file" accept="image/png,image/jpeg,image/webp">
  <img id="thumb">
</div>

<div class="card">
  <label>2. プリセット</label>
  <select id="preset">
    <option value="illust" selected>イラスト：高品質・900KB以内</option>
    <option value="photo">写真：軽量ベクター化</option>
    <option value="logo">ロゴ：くっきり</option>
  </select>
</div>

<div class="card">
  <label>3. 変換</label>
  <button id="convert">SVG化する</button>
  <button id="download" class="secondary">SVGをダウンロード</button>
  <button id="copy" class="secondary">SVGコードをコピー</button>
</div>

<div class="card">
  <label>変換結果</label>
  <div class="grid">
    <div class="stat">
      <small>SVGサイズ</small>
      <div id="size" class="big">- KB</div>
    </div>
    <div class="stat">
      <small>処理サイズ</small>
      <div id="dim">-</div>
    </div>
  </div>
  <div id="status">画像を選択してください</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>

<script>
const LIMIT_KB = 900;

let sourceImg = null;
let svgText = "";

const presets = {
  illust:{
    ltres:.22, qtres:.22, pathomit:0,
    numberofcolors:120, colorquantcycles:10,
    blurradius:0, blurdelta:10,
    scale:1, roundcoords:2,
    viewbox:true, desc:false,
    lcpr:0, qcpr:0
  },
  photo:{
    ltres:.75, qtres:.75, pathomit:4,
    numberofcolors:56, colorquantcycles:5,
    blurradius:1, blurdelta:20,
    scale:1, roundcoords:1,
    viewbox:true, desc:false,
    lcpr:0, qcpr:0
  },
  logo:{
    ltres:.8, qtres:.8, pathomit:3,
    numberofcolors:24, colorquantcycles:4,
    blurradius:0, blurdelta:20,
    scale:1, roundcoords:2,
    viewbox:true, desc:false,
    lcpr:0, qcpr:0
  }
};

function clean(svg){
  return svg
    .replace(/<!--[\s\S]*?-->/g,"")
    .replace(/<desc[\s\S]*?<\/desc>/g,"")
    .replace(/<title[\s\S]*?<\/title>/g,"")
    .replace(/<image[\s\S]*?\/>/g,"")
    .replace(/<foreignObject[\s\S]*?<\/foreignObject>/g,"")
    .replace(/\sstyle="[^"]*"/g,"")
    .replace(/\s(id|class|data-name)="[^"]*"/g,"")
    .replace(/\sxmlns:xlink="[^"]*"/g,"")
    .replace(/\n/g," ")
    .replace(/\s+/g," ")
    .replace(/>\s+</g,"><")
    .trim();
}

function kb(svg){
  return new Blob([svg]).size / 1024;
}

function loadImage(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.src = e.target.result;
      document.getElementById("thumb").src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function draw(img,max){
  let w = img.width;
  let h = img.height;

  if(w > max || h > max){
    const r = Math.min(max / w, max / h);
    w = Math.round(w * r);
    h = Math.round(h * r);
  }

  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d",{willReadFrequently:true});
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(img,0,0,w,h);

  return {
    data:ctx.getImageData(0,0,w,h),
    w,h
  };
}

function trace(data,opt){
  return clean(ImageTracer.imagedataToSVG(data,opt));
}

function convertIllust(img){
  const tries = [
    {max:1900, colors:120, pathomit:0, res:.22},
    {max:1800, colors:112, pathomit:0, res:.26},
    {max:1700, colors:104, pathomit:1, res:.32},
    {max:1600, colors:96,  pathomit:1, res:.38},
    {max:1500, colors:88,  pathomit:2, res:.46},
    {max:1400, colors:80,  pathomit:2, res:.55},
    {max:1300, colors:72,  pathomit:3, res:.65},
    {max:1200, colors:64,  pathomit:3, res:.8},
    {max:1100, colors:56,  pathomit:4, res:1},
    {max:1000, colors:48,  pathomit:5, res:1.2}
  ];

  let best = null;

  for(const t of tries){
    const d = draw(img,t.max);
    const opt = {...presets.illust};

    opt.numberofcolors = t.colors;
    opt.pathomit = t.pathomit;
    opt.ltres = t.res;
    opt.qtres = t.res;

    const svg = trace(d.data,opt);
    const size = kb(svg);

    const result = {
      svg,
      size,
      w:d.w,
      h:d.h,
      colors:t.colors,
      ok:size <= LIMIT_KB
    };

    if(!best || Math.abs(LIMIT_KB - size) < Math.abs(LIMIT_KB - best.size)){
      best = result;
    }

    if(size <= LIMIT_KB){
      return result;
    }
  }

  return best;
}

function convertNormal(img,type){
  const max = type === "photo" ? 1100 : 1600;
  const d = draw(img,max);
  const svg = trace(d.data,presets[type]);

  return {
    svg,
    size:kb(svg),
    w:d.w,
    h:d.h,
    colors:presets[type].numberofcolors,
    ok:true
  };
}

document.getElementById("file").addEventListener("change",async e=>{
  const file = e.target.files[0];
  if(!file) return;

  sourceImg = await loadImage(file);
  svgText = "";

  document.getElementById("status").textContent =
    `読み込み完了：${sourceImg.width}×${sourceImg.height}px`;
});

document.getElementById("convert").addEventListener("click",()=>{
  if(!sourceImg){
    alert("画像を選択してください");
    return;
  }

  const type = document.getElementById("preset").value;

  document.getElementById("status").textContent =
    "変換中です。スマホでは数十秒かかる場合があります。";

  setTimeout(()=>{
    const result = type === "illust"
      ? convertIllust(sourceImg)
      : convertNormal(sourceImg,type);

    svgText = result.svg;

    document.getElementById("size").textContent =
      Math.round(result.size) + " KB";

    document.getElementById("dim").textContent =
      result.w + " × " + result.h + " px";

    document.getElementById("status").textContent =
      `完了
色数：約${result.colors}色
${type === "illust" ? (result.ok ? "900KB以下で出力済み" : "900KBを少し超過しました") : "変換完了"}
SVGプレビューは重くなるため表示していません。`;

  },100);
});

document.getElementById("download").addEventListener("click",()=>{
  if(!svgText){
    alert("先にSVG化してください");
    return;
  }

  const blob = new Blob([svgText],{type:"image/svg+xml"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "gt7-ultra-quality.svg";
  a.click();

  URL.revokeObjectURL(url);
});

document.getElementById("copy").addEventListener("click",async()=>{
  if(!svgText){
    alert("先にSVG化してください");
    return;
  }

  await navigator.clipboard.writeText(svgText);
  alert("SVGコードをコピーしました");
});
</script>

</body>
</html>
